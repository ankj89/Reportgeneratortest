<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Validation Report Generator</title>

<script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;background:#f4f6fb;padding:20px}
.card{background:#fff;padding:20px;border-radius:10px;max-width:650px;margin:auto}
button{padding:10px 16px;background:#1e3d8f;color:white;border:none;border-radius:6px;margin-top:10px;cursor:pointer;margin-right:8px}
.section{margin-top:30px;page-break-before:always}
.section:first-child{page-break-before:auto}
.logo{font-size:22px;font-weight:bold;margin-bottom:20px}
table{border-collapse:collapse;width:100%}
th,td{border:1px solid #ccc;padding:8px}
th{background:#1e3d8f;color:#fff;font-weight:bold}
.header{background:#eef2ff;font-weight:bold}
.hidden{display:none}
</style>
</head>

<body>

<div class="card">
<h2>Validation Report Generator</h2>

<input type="file" id="fileInput" accept=".xlsx" />
<br>

<button id="generateBtn">Generate Report</button>
<button id="saveBtn" class="hidden">Save Insights</button>
<button id="resetBtn">Reset</button>

<div id="postFinalize" class="hidden">
<button id="pdfBtn">Download PDF</button>
<button id="excelBtn">Download Excel</button>
<button id="editBtn">Edit Insights</button>
</div>

</div>

<div id="reportPreview"></div>

<script>

var insightsData = [];
var measData = [];
var matrixDataRaw = [];
var projectDataRaw = {};
var societyData = [];

/* ---------------- RULE ENGINE CONFIG ---------------- */
const RULES = [
{
id:"RCC_WALL",
type:"wall",
condition:{itemIncludes:"load-bearing",valueEquals:"Yes"},
output:(matches)=>{
let walls = matches.map(m=>m.Walls).filter(Boolean);
if(!walls.length) return null;
return `${walls.join(", ")} are RCC/structural walls. No demolition or chiselling allowed. Electrical/plumbing must be surface or panel-based.`;
}
},
{
id:"DEMOLITION_LIMIT",
type:"society",
condition:{questionIncludes:"demolition",valueEquals:"Manual"},
output:()=> "Only manual demolition allowed. Project timeline and cost may increase."
},
{
id:"ACCESS_CONSTRAINT",
type:"society",
condition:{questionIncludes:"vehicle entry",valueEquals:"No"},
output:()=> "No vehicle access. Material handling will be manual, increasing labor effort and cost."
},
{
id:"WALL_SEEPAGE",
type:"wall",
condition:{itemIncludes:"seepage",valueEquals:"Yes"},
output:()=> "Wall seepage observed. Waterproofing treatment required before finishing."
},
{
id:"ROOM_DIAGONAL",
type:"measurement",
condition:{fields:["diag1","diag2"]},
output:(vals)=>{
let nums = vals.map(v=>Number(v)).filter(v=>!isNaN(v) && v!==0);
if(nums.length<2) return null;
let diff = Math.abs(nums[0]-nums[1]);
if(diff>25) return "Room diagonals are out by >25mm, plastering required on walls.";
if(diff>=10) return "Room diagonals out by 10–25 mm, punning required on walls.";
return null;
}
},
{
id:"CEILING_VARIATION",
type:"measurement",
condition:{fields:["fc1","fc2","fc3","fc4","fc5"]},
output:(vals)=>{
let nums = vals.map(v=>Number(v)).filter(v=>!isNaN(v) && v!==0);
if(nums.length<2) return null;
let diff = Math.max(...nums)-Math.min(...nums);
if(diff>25) return "Ceiling level variation > 25mm. False ceiling required.";
if(diff>=10) return "Ceiling level variation 10–25mm. Punning required.";
return null;
}
},
{
id:"CLEAR_HEIGHT",
type:"measurement",
condition:{fields:["beamFloor","sprinklerFloor","fc1","fc2","fc3","fc4","fc5"]},
output:(vals,m)=>{
let nums = vals.map(v=>Number(v)).filter(v=>!isNaN(v) && v!==0);
if(!nums.length) return null;
let minVal = Math.min(...nums);
let depth = minVal - 2750; /* FIXED */
let txt = `Clear height available: ${minVal} mm, depth available for false ceiling: ${depth} mm.`;
if(depth < 150) txt += " False ceiling not recommended.";
return txt;
}
},
{
id:"SOFFIT_AC",
type:"measurement",
condition:{fields:["soffitNW","soffitEW","soffitSW","soffitWW","winSoffitNW","winSoffitEW","winSoffitSW","winSoffitWW"]},
output:(vals,m)=>{
let walls = [];
function clean(v){let n = Number(v);return (isNaN(n)||n<=0)?null:n;}
const map = [
["NW", clean(m.soffitNW), clean(m.winSoffitNW)],
["EW", clean(m.soffitEW), clean(m.winSoffitEW)],
["SW", clean(m.soffitSW), clean(m.winSoffitSW)],
["WW", clean(m.soffitWW), clean(m.winSoffitWW)]
];
map.forEach(([w,d1,d2])=>{
let trigger=false;
if(d1!==null && d1<800) trigger=true;
if(d2!==null && d2<800) trigger=true;
if(trigger) walls.push(w);
});
if(!walls.length) return null;
return `Sufficient space for split AC not available on walls ${walls.join(", ")}. False ceiling pocket may be required.`;
}
},
{
id:"WALL_UNDULATION",
type:"measurement",
condition:{fields:["undNW","undEW","undSW","undWW"]},
output:(vals,m)=>{
let walls=[];
const map=[["NW",m.undNW],["EW",m.undEW],["SW",m.undSW],["WW",m.undWW]];
map.forEach(([w,v])=>{
let val=parseFloat(v);
if(!isNaN(val) && val>5) walls.push(w);
});
if(!walls.length) return null;
return `Wall undulation observed on ${walls.join(", ")} walls. Punning/replastering required.`;
}
},
{
id:"WINDOW_SOFFIT_LOW",
type:"measurement",
condition:{fields:["winSoffitNW","winSoffitEW","winSoffitSW","winSoffitWW"]},
output:(vals,m)=>{
let walls=[];
const map=[["NW",m.winSoffitNW],["EW",m.winSoffitEW],["SW",m.winSoffitSW],["WW",m.winSoffitWW]];
map.forEach(([w,v])=>{
let val=Number(v)||0;
if(val>0 && val<700) walls.push(w);
});
if(!walls.length) return null;
return `Low window soffit height on ${walls.join(", ")}. Curtain/pelmet design will be impacted.`;
}
},
{
id:"WATER",
type:"society",
condition:{questionIncludes:"water",valueEquals:"No"},
output:()=>"No water supply available. Temporary arrangement required."
},
{
id:"POWER",
type:"society",
condition:{questionIncludes:"power",valueEquals:"No"},
output:()=>"No power supply available. DG/temporary power required."
}
];

function runRuleEngine(rooms){
let insights=[];

RULES.filter(r=>r.type==="wall").forEach(rule=>{
rooms.forEach(room=>{
let matches = matrixDataRaw.filter(x=>
x.Room===room &&
x.Section==="Wall" &&
((x.Item||"").toLowerCase().replace(/[^a-z]/g,"").includes(rule.condition.itemIncludes.replace(/[^a-z]/g,""))) &&
x.Value===rule.condition.valueEquals
);
if(matches.length){
let res = rule.output(matches);
if(res) insights.push({room:room,text:res});
}
});
});

RULES.filter(r=>r.type==="measurement").forEach(rule=>{
measData.forEach(m=>{
if(!m.Room) return;
let vals = rule.condition.fields.map(f=>{
let v=m[f];
return (v===undefined||v===""||v===null)?null:v;
});
let res = rule.output(vals,m); /* FIXED PARAM */
if(res) insights.push({room:m.Room,text:res});
});
});

RULES.filter(r=>r.type==="society").forEach(rule=>{
societyData.forEach(s=>{
if((s.Question||"").toLowerCase().includes(rule.condition.questionIncludes) &&
(s.Value||"").toLowerCase().trim()===rule.condition.valueEquals.toLowerCase()){
let res = rule.output(s);
if(res) insights.push({room:"All",text:res});
}
});
});

return insights;
}

function bindEvents(){
document.getElementById("generateBtn").onclick = processFile;
document.getElementById("saveBtn").onclick = saveInsights;
document.getElementById("pdfBtn").onclick = downloadPDF;
document.getElementById("excelBtn").onclick = downloadExcel;
document.getElementById("editBtn").onclick = enableEditing;
document.getElementById("resetBtn").onclick = resetApp;
}

function formatLabel(key){
return key.replace(/([A-Z])/g,' $1').replace(/_/g,' ').replace(/^./,c=>c.toUpperCase());
}

function getUnique(arr,key){ return [...new Set(arr.map(x=>x[key]))]; }

function processFile(){
let file=document.getElementById("fileInput").files[0];
if(!file){alert("Upload file first");return;}

let reader=new FileReader();
reader.onload=function(e){
let wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});

let raw=XLSX.utils.sheet_to_json(wb.Sheets["Validation Data"]||{});
let meas=XLSX.utils.sheet_to_json(wb.Sheets["Measurements"]||{});
societyData=XLSX.utils.sheet_to_json(wb.Sheets["Society Constraints"]||{});

if(!raw.length){alert("No data");return;}

matrixDataRaw=raw; measData=meas; projectDataRaw=raw[0];
let rooms=getUnique(raw,"Room");

let html='<div id="reportContainer">';
html+='<div class="logo">SITE VALIDATION REPORT</div>';

html+='<div class="section"><h2>Project Details</h2><table>';
html+='<tr><th>Display Name</th><th>Value</th></tr>';
for(let k in projectDataRaw){
if(!["Room","Section","Item","Value"].includes(k)){
html+=`<tr><td>${formatLabel(k)}</td><td>${projectDataRaw[k]}</td></tr>`;
}}
html+='</table></div>';

if(societyData.length){
html+='<div class="section"><h2>Society Constraints</h2><table>';
html+='<tr><th>Question</th><th>Value</th></tr>';
let grouped={};
societyData.forEach(x=>{let c=x.Category||"Others"; if(!grouped[c])grouped[c]=[]; grouped[c].push(x);});
for(let cat in grouped){
html+=`<tr class="header"><td colspan="2">${cat}</td></tr>`;
grouped[cat].forEach(i=>{
html+=`<tr><td>${i.Question}</td><td>${i.Value||""}</td></tr>`;
});
}
html+='</table></div>';
}

html+='<div class="section"><h2>Validation Matrix</h2><table>';
html+='<tr><th>Question</th>';
rooms.forEach(r=>html+=`<th>${r} (Result)</th><th>${r} (Comments)</th>`);
html+='</tr>';

function render(section,title){
html+=`<tr class="header"><td colspan="${1+rooms.length*2}">${title}</td></tr>`;
let subset=raw.filter(x=>x.Section===section);
let qs=getUnique(subset,"Item");
qs.forEach(q=>{
html+=`<tr><td>${q}</td>`;
rooms.forEach(r=>{
let rec=subset.find(x=>x.Room===r&&x.Item===q)||{};
html+=`<td>${rec.Value||""}</td><td>${rec.Comments||""}</td>`;
});
html+='</tr>';
});
}

render("Wall","WALL VALIDATION");
render("Room","ROOM VALIDATION");
html+='</table></div>';

/* -------- MEASUREMENTS -------- */
html += '<div class="section"><h2>Measurements</h2><table>';
if(measData && measData.length){
let keys = Object.keys(measData[0]).filter(k => k !== "Room");
html += '<tr><th>Measurement</th>';
rooms.forEach(r => html += `<th>${r}</th>`);
html += '</tr>';
keys.forEach(k=>{
html += `<tr><td>${formatLabel(k)}</td>`;
rooms.forEach(r=>{
let rec = measData.find(x => x.Room === r) || {};
html += `<td>${rec[k] || ""}</td>`;
});
html += '</tr>';
});
}
html += '</table></div>';

/* -------- INSIGHTS -------- */
let autoInsights=runRuleEngine(rooms);
let roomInsights={};
rooms.forEach(r=>roomInsights[r]=[]);

autoInsights.forEach(i=>{
if(i.room==="All"){
rooms.forEach(r=>{
if(!roomInsights[r].includes(i.text)) roomInsights[r].push(i.text);
});
}else{
if(!roomInsights[i.room].includes(i.text)) roomInsights[i.room].push(i.text);
}
});

let maxRows = Math.max(...Object.values(roomInsights).map(a=>a.length),5);

html+='<div class="section"><h2>Insights</h2><table id="insightTable">';
html+='<tr><th>SNo</th>';
rooms.forEach(r=>html+=`<th>${r}</th>`);
html+='</tr>';

for(let i=0;i<maxRows;i++){
html+=`<tr><td>${i+1}</td>`;
rooms.forEach(r=>{
let text=roomInsights[r][i]||"";
html+=`<td contenteditable="true">${text}</td>`;
});
html+='</tr>';
}
html+='</table></div>';

html+='</div>';

document.getElementById("reportPreview").innerHTML=html;
document.getElementById("generateBtn").classList.add("hidden");
document.getElementById("saveBtn").classList.remove("hidden");
};
reader.readAsArrayBuffer(file);
}

function saveInsights(){
let table=document.getElementById("insightTable");
let headers=[...table.rows[0].cells].map(c=>c.innerText);
insightsData=[];
for(let r=1;r<table.rows.length;r++){
let obj={};
for(let c=0;c<table.rows[r].cells.length;c++){
obj[headers[c]]=table.rows[r].cells[c].innerText;
}
insightsData.push(obj);
}

document.querySelectorAll("[contenteditable]").forEach(el=>el.removeAttribute("contenteditable"));

document.getElementById("saveBtn").classList.add("hidden");
document.getElementById("postFinalize").classList.remove("hidden");
}

function enableEditing(){
document.querySelectorAll("#insightTable td:not(:first-child)").forEach(td=>td.setAttribute("contenteditable","true"));
}

function downloadPDF(){
var content=document.getElementById("reportContainer").outerHTML;
var w=window.open();
w.document.write(`
<html><head>
<style>
@page{size:A4 landscape;margin:15mm}
body{font-family:Arial;padding:10px}
table{border-collapse:collapse;width:100%}
th,td{border:1px solid #000;padding:6px;font-size:10px}
th{background:#1e3d8f;color:#fff}
.header td{background:#eef2ff;font-weight:bold}
.section{page-break-before:always}
.section:first-child{page-break-before:auto}
</style>
</head><body>${content}</body></html>`);
setTimeout(()=>w.print(),500);
}

function downloadExcel(){
var wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(insightsData),"Insights");
XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(societyData),"Society Constraints");
XLSX.writeFile(wb,"Validation_Report.xlsx");
}

function resetApp(){location.reload();}

document.addEventListener("DOMContentLoaded",bindEvents);

</script>

</body>
</html>
