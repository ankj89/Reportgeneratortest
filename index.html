<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Validation Report Generator</title>

<script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;background:#f4f6fb;padding:20px}
.card{background:#fff;padding:20px;border-radius:10px;max-width:650px;margin:auto}
button{padding:10px 16px;background:#1e3d8f;color:white;border:none;border-radius:6px;margin-top:10px;cursor:pointer;margin-right:8px}
.section{margin-top:30px;page-break-before:always}
.section:first-child{page-break-before:auto}
.logo{font-size:22px;font-weight:bold;margin-bottom:20px}
table{border-collapse:collapse;width:100%}
th,td{border:1px solid #ccc;padding:8px}
th{background:#1e3d8f;color:#fff;font-weight:bold}
.header{background:#eef2ff;font-weight:bold}
.hidden{display:none}
.tag{font-size:10px;padding:2px 6px;border-radius:4px;margin-right:6px}
.high{background:#ffcccc}
.medium{background:#fff3cd}
.low{background:#d4edda}
</style>
</head>

<body>

<div class="card">
<h2>Validation Report Generator</h2>
<input type="file" id="fileInput" accept=".xlsx" />
<br>
<button id="generateBtn">Generate Report</button>
<button id="saveBtn" class="hidden">Save Insights</button>
<button id="resetBtn">Reset</button>
<div id="postFinalize" class="hidden">
<button id="pdfBtn">Download PDF</button>
<button id="excelBtn">Download Excel</button>
<button id="editBtn">Edit Insights</button>
</div>
</div>

<div id="reportPreview"></div>

<script>

var insightsData = [];
var measData = [];
var matrixDataRaw = [];
var projectDataRaw = {};
var societyData = [];

function norm(str){return (str||"").toLowerCase().replace(/[^a-z0-9]/g,"");}

/* ---------------- RULE ENGINE CONFIG ---------------- */
const RULES = [
{
id:"RCC_WALL",
type:"wall",
condition:{itemIncludes:"load-bearing",valueEquals:"Yes"},
output:(matches)=>{
let walls = matches.map(m=>m.Walls).filter(Boolean);
return {text:`RCC walls (${walls.join(", ")}) detected. No demolition or chiselling allowed. Wall panelling required for any electrical works.`,severity:"HIGH",category:"STRUCTURAL"};
}
},
{
id:"STRUCTURAL_CRACK",
type:"wall",
condition:{itemIncludes:"structural crack",valueEquals:"Yes"},
output:(matches)=>{
let walls = matches.map(m => m.Walls).filter(Boolean);
if(!walls.length) return null;
return {text:`Structural crack observed on walls ${walls.join(", ")}. Structural engineer intervention required (Cx scope).`,severity:"HIGH",category:"STRUCTURAL"};
}
},
{
id:"HAIRLINE_CRACK",
type:"wall",
condition:{itemIncludes:"hairline crack",valueEquals:"Yes"},
output:(matches)=>{
let walls = matches.map(m => m.Walls).filter(Boolean);
if(!walls.length) return null;
return {text:`Hairline cracks on walls ${walls.join(", ")}. Re-plastering required.`,severity:"HIGH",category:"STRUCTURAL"};
}
},
{
id:"DARK_SHADE",
type:"wall",
condition:{itemIncludes:"darker",valueEquals:"Yes"},
output:(matches)=>{
let walls = matches.map(m=>m.Walls).filter(Boolean);
return {text:`Existing ${walls.join(", ")} walls have dark shade. Lighter repaint not recommended.`,severity:"LOW",category:"FINISHING"};
}
},
{
id:"FALSE_CEILING",
type:"room",
condition:{itemIncludes:"existing false ceiling",valueEquals:"No"},
output:()=>({text:"Existing ceiling not in good condition. Demolition recommended.",severity:"MEDIUM",category:"FINISHING"})
},
{
id:"WIRING",
type:"room",
condition:{itemIncludes:"wiring",valueEquals:"No"},
output:()=>({text:"Existing wiring not in good condition. Re-wiring required.",severity:"HIGH",category:"EXECUTION"})
},
{
id:"WALL_SEEPAGE",
type:"wall",
condition:{itemIncludes:"water seepage",valueEquals:"Yes"},
output:()=>({text:"Wall seepage observed. Damp-proof treatment required (Cx scope).",severity:"HIGH",category:"FINISHING"})
},
{
id:"CEILING_SEEPAGE",
type:"room",
condition:{itemIncludes:"water leaks or moisture",valueEquals:"Yes"},
output:()=>({text:"Ceiling seepage observed. Waterproofing required (Cx scope).",severity:"HIGH",category:"FINISHING"})
},
{
id:"CEILING_UNDULATION",
type:"room",
condition:{itemIncludes:"undulations",valueEquals:"Yes"},
output:()=>({text:"Ceiling undulation present. Punning/false ceiling required.",severity:"MEDIUM",category:"FINISHING"})
},
{
id:"SCAFFOLDING",
type:"society",
condition:{questionIncludes:"scaffold",valueEquals:"Yes"},
output:()=>({text:"Height >10 ft. Scaffolding cost applicable.",severity:"HIGH",category:"COST"})
},
{
id:"VEHICLE_SMALL",
type:"society",
condition:{questionIncludes:"vehicle",valueEquals:"Yes,small size"},
output:()=>({text:"Only small vehicles allowed. Additional transport cost.",severity:"MEDIUM",category:"COST"})
},
{
id:"VEHICLE_NONE",
type:"society",
condition:{questionIncludes:"vehicle",valueEquals:"No"},
output:()=>({text:"No vehicle entry. Manual handling cost applicable.",severity:"HIGH",category:"COST"})
},
{
id:"SERVICE_LIFT_NONE",
type:"society",
condition:{questionIncludes:"lift",valueEquals:"No"},
output:()=>({text:"No service lift. Manual lifting cost.",severity:"HIGH",category:"COST"})
},
{
id:"LOADING_DISTANCE_FAR",
type:"society",
condition:{questionIncludes:"loading",valueEquals:"More than 30 ft"},
output:()=>({text:"Loading distance >30 ft. Long lead cost applicable.",severity:"HIGH",category:"COST"})
},
{
id:"ROOM_DIAGONAL",
type:"measurement",
condition:{fields:["diag1","diag2"]},
output:(vals)=>{
let nums=vals.map(Number).filter(v=>!isNaN(v)&&v!==0);
if(nums.length<2) return null;
let diff=Math.abs(nums[0]-nums[1]);
if(diff>25) return {text:"Room geometry deviation >25mm. Plastering required.",severity:"HIGH",category:"GEOMETRY"};
if(diff>=10) return {text:"Room geometry deviation 10–25mm. Punning required.",severity:"MEDIUM",category:"GEOMETRY"};
return null;
}
},
{
id:"CEILING_VARIATION",
type:"measurement",
condition:{fields:["fc1","fc2","fc3","fc4","fc5"]},
output:(vals)=>{
let nums=vals.map(Number).filter(v=>!isNaN(v)&&v!==0);
if(nums.length<2) return null;
let diff=Math.max(...nums)-Math.min(...nums);
if(diff>25) return {text:"Ceiling variation >25mm. False ceiling required.",severity:"HIGH",category:"LEVELS"};
if(diff>=10) return {text:"Ceiling variation 10–25mm. Punning required.",severity:"MEDIUM",category:"LEVELS"};
return null;
}
},
{
id:"CLEAR_HEIGHT",
type:"measurement",
condition:{fields:["beamFloor","sprinklerFloor","fc1","fc2","fc3","fc4","fc5"]},
output:(vals)=>{
let nums=vals.map(Number).filter(v=>!isNaN(v)&&v!==0);
if(!nums.length) return null;
let minVal=Math.min(...nums);
let depth=2750 - minVal;
return {text:`Clear height ${minVal}mm. Ceiling depth ${depth}mm (${depth<150?"Not recommended":"OK"}).`,severity:"HIGH",category:"EXECUTION"};
}
},
  {
id:"SOFFIT_AC",
type:"measurement",
condition:{fields:["soffitNW","soffitEW","soffitSW","soffitWW","winSoffitNW","winSoffitEW","winSoffitSW","winSoffitWW"]},
output:(vals,m)=>{

let walls=[];

const map=[
["NW",m.soffitNW,m.winSoffitNW],
["EW",m.soffitEW,m.winSoffitEW],
["SW",m.soffitSW,m.winSoffitSW],
["WW",m.soffitWW,m.winSoffitWW]
];

map.forEach(([w,d1,d2])=>{
let v1=parseFloat(d1);
let v2=parseFloat(d2);

if((!isNaN(v1)&&v1>0&&v1<800) || (!isNaN(v2)&&v2>0&&v2<800)){
walls.push(w);
}
});

if(!walls.length) return null;

return {
text:`AC space constraint on walls ${walls.join(", ")}. False ceiling pocket may be required.`,
severity:"MEDIUM",
category:"EXECUTION"
};

}
}
];

function runRuleEngine(rooms){
let insights=[];

/* WALL RULES */
RULES.filter(r=>r.type==="wall").forEach(rule=>{
rooms.forEach(room=>{
let matches=matrixDataRaw.filter(x=>x.Room===room && x.Section==="Wall" && norm(x.Item).includes(norm(rule.condition.itemIncludes)) && norm(x.Value).includes(norm(rule.condition.valueEquals)));
if(matches.length){
let res=rule.output(matches);
if(res) insights.push({room,text:res.text,meta:res});
}
});});

/* ROOM RULES */
RULES.filter(r=>r.type==="room").forEach(rule=>{
rooms.forEach(room=>{
let matches=matrixDataRaw.filter(x=>x.Room===room && x.Section==="Room" && norm(x.Item).includes(norm(rule.condition.itemIncludes)) && norm(x.Value).includes(norm(rule.condition.valueEquals)));
if(matches.length){
let res=rule.output(matches);
if(res) insights.push({room,text:res.text,meta:res});
}
});});

/* MEASUREMENT */
RULES.filter(r=>r.type==="measurement").forEach(rule=>{
measData.forEach(m=>{
if(!m.Room) return;
let vals=rule.condition.fields.map(f=>m[f]||null);
let res=rule.output(vals,m);
if(res) insights.push({room:m.Room,text:res.text,meta:res});
});});

/* SOCIETY */
RULES.filter(r=>r.type==="society").forEach(rule=>{
societyData.forEach(s=>{
if(
(
norm(s.Question).includes(norm(rule.condition.questionIncludes)) ||
norm(rule.condition.questionIncludes).includes(norm(s.Question))
) &&
norm(s.Value || "").includes(norm(rule.condition.valueEquals))
){
let res=rule.output(s);
if(res) insights.push({room:"All",text:res.text,meta:res});
}
});});

return insights;
}

function bindEvents(){
document.getElementById("generateBtn").onclick = processFile;
document.getElementById("saveBtn").onclick = saveInsights;
}
function getUnique(arr,key){ return [...new Set(arr.map(x=>x[key]))]; }

function addInsightRow(){
let table=document.getElementById("insightTable");
let row=table.insertRow();
let cols=table.rows[0].cells.length;
for(let i=0;i<cols;i++){
let cell=row.insertCell();
if(i===0) cell.innerText=table.rows.length-1;
else cell.contentEditable="true";
}
}
function saveInsights(){

insightsData = [];

let table = document.getElementById("insightTable");

for(let i=1;i<table.rows.length;i++){

let row = table.rows[i];
let rowData = [];

for(let j=1;j<row.cells.length;j++){
rowData.push(row.cells[j].innerText.trim());
}

insightsData.push(rowData);

}

alert("Insights saved successfully");

document.getElementById("postFinalize").classList.remove("hidden");

}
  
function processFile(){
let file=document.getElementById("fileInput").files[0];
if(!file){alert("Upload file first");return;}

let reader=new FileReader();
reader.onload=function(e){
let wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});

matrixDataRaw=XLSX.utils.sheet_to_json(wb.Sheets["Validation Data"]||{});
measData=XLSX.utils.sheet_to_json(wb.Sheets["Measurements"]||{});
societyData=XLSX.utils.sheet_to_json(wb.Sheets["Society Constraints"]||{});

let rooms=getUnique(matrixDataRaw,"Room");

let html='<div id="reportContainer"><div class="logo">SITE VALIDATION REPORT</div>';

/* MATRIX */
html+='<div class="section"><h2>Validation Matrix</h2><table><tr><th>Question</th>';
rooms.forEach(r=>html+=`<th>${r}</th>`);
html+='</tr>';

let qs=getUnique(matrixDataRaw,"Item");
qs.forEach(q=>{
html+=`<tr><td>${q}</td>`;
rooms.forEach(r=>{
let rec=matrixDataRaw.find(x=>x.Room===r&&x.Item===q)||{};
let val=rec.Value||"";
if(rec.Walls) val+=` (${rec.Walls})`;
html+=`<td>${val}</td>`;
});
html+='</tr>';
});
html+='</table></div>';

/* INSIGHTS */
let autoInsights=runRuleEngine(rooms);
let roomInsights={};
rooms.forEach(r=>roomInsights[r]=[]);

autoInsights.forEach(i=>{
if(i.room==="All") rooms.forEach(r=>roomInsights[r].push(i.meta));
else roomInsights[i.room].push(i.meta);
});

html+='<div class="section"><h2>Insights</h2>';
html+='<button onclick="addInsightRow()">+ Add Row</button>';
html+='<table id="insightTable"><tr><th>SNo</th>';
rooms.forEach(r=>html+=`<th>${r}</th>`);
html+='</tr>';

let maxRows=Math.max(...Object.values(roomInsights).map(a=>a.length),5);
for(let i=0;i<maxRows;i++){
html+=`<tr><td>${i+1}</td>`;
rooms.forEach(r=>{
let txt=roomInsights[r][i]?.text||"";
html+=`<td contenteditable="true">${txt}</td>`;
});
html+='</tr>';
}

html+='</table></div></div>';

document.getElementById("reportPreview").innerHTML=html;
document.getElementById("saveBtn").classList.remove("hidden");
};
reader.readAsArrayBuffer(file);
}

document.addEventListener("DOMContentLoaded",bindEvents);

</script>

</body>
</html>
