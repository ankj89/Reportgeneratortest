<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Site Validation Tool</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6fb;
}

header{
background:#1e3d8f;
color:white;
padding:14px;
font-size:18px;
position:sticky;
top:0;
z-index:10;
}

.container{
padding:14px;
max-width:1200px;
margin:auto;
}

.card{
background:white;
padding:16px;
margin-bottom:14px;
border-radius:8px;
border:1px solid #ddd;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
}

@media(max-width:900px){
.grid{grid-template-columns:1fr;}
}

input,select,textarea{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

textarea{
height:70px;
color:#333;
}

textarea::placeholder{
color:#aaa;
}

button{
padding:12px 16px;
border:none;
background:#1e3d8f;
color:white;
border-radius:6px;
margin:4px;
font-size:14px;
cursor:pointer;
}

.roomNav{
position:sticky;
top:60px;
background:white;
padding:8px;
border-bottom:1px solid #ddd;
z-index:9;
}

.roomTab{
display:inline-block;
padding:10px 14px;
border:1px solid #ccc;
margin:4px;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

table th,table td{
border:1px solid #ddd;
padding:6px;
text-align:center;
font-size:13px;
}

.question{
border-bottom:1px dashed #ddd;
padding-bottom:10px;
margin-bottom:10px;
}

.sectionHeader{
background:#eef2ff;
padding:8px;
border-radius:6px;
margin-top:12px;
font-weight:bold;
}

</style>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body>

<header>Site Validation Tool</header>

<div class="container">

<!-- PRELIMINARY PROJECT DETAILS -->

<div class="card">

<h3>Preliminary Project Details</h3>

<div class="grid">

<input id="pid" placeholder="PID">

<input id="cx" placeholder="Customer Name">

<input id="city" placeholder="City">

<input id="address" placeholder="Address">

<input id="society" placeholder="Society">

<input id="flat" placeholder="Flat No">

<select id="serviceLift">
<option value="">Service Lift Available</option>
<option>Yes</option>
<option>No</option>
</select>

<input id="liftSize" placeholder="Service Lift Size">

<select id="passLift">
<option value="">Passenger Lift Usage</option>
<option>Allowed</option>
<option>Not Allowed</option>
<option>No Lift</option>
</select>

<select id="vehicle">
<option value="">Vehicle Entry</option>
<option>Small Vehicles</option>
<option>Large Vehicles</option>
<option>Not Allowed</option>
</select>

<select id="power">
<option value="">Power Supply Available</option>
<option>Yes</option>
<option>No</option>
</select>

<select id="water">
<option value="">Water Supply Available</option>
<option>Yes</option>
<option>No</option>
</select>

<select id="mivan">
<option value="">Mivan Construction</option>
<option>Yes</option>
<option>No</option>
</select>

<select id="demo">
<option value="">Demolition Allowed</option>
<option>Manual</option>
<option>Mechanised</option>
<option>Both</option>
</select>

<input id="workTime" placeholder="Work Timing Restrictions">

<textarea id="societyRestrictions" placeholder="Add Comments"></textarea>

</div>

</div>

<div class="roomNav">

<div id="roomTabs"></div>

<button onclick="addRoom()">Add Room</button>

</div>

<div class="card" id="roomForm"></div>

<div class="card">

<button onclick="generateExcel()">Generate Excel</button>
<button onclick="fillTestData()">Fill Test Data</button>
<button onclick="clearAllData()">Clear All Data</button>

</div>

</div>

<script>

const walls=["NW","EW","SW","WW"]

const defaultRooms=[
"Living Room",
"Kitchen",
"Bedroom 1",
"Bedroom 2",
"Bathroom 1",
"Bathroom 2",
"Balcony"
]

const roomQuestions=[

"False ceiling clearance sufficient",
"Ceiling undulation present",
"Water leakage on ceiling",
"Sliding system feasible",
"Window modification possible",
"Window condition poor",
"Module relocation possible",
"15A power supply present",
"Plumbing issues present",
"Plumbing outdated",
"Main inlet valve accessible",
"Space for shower cubicle",
"WC relocation possible",
"Damp proof required",
"Weather proof required",
"Existing countertop present",
"False ceiling damage",
"Door condition poor",
"Door refurbishable",
"Termite infestation present"

]

const wallQuestions=[

"Load bearing wall / Mivan wall",
"Dry wall / Gypsum wall",
"Major cracks requiring structural repair",
"Surface undulation",
"Undulation more than 6mm",
"Minor cracks / loose plaster",
"Core cut location available",
"Switch/socket working condition",
"Switchboard reusable",
"Split AC possible",
"Dark shade on wall",
"Paint condition poor"

]

let data={rooms:{}}

function init(){

defaultRooms.forEach(r=>{
data.rooms[r]={measurements:{},electrical:{},room:{},walls:{}}
})

renderTabs()

}

function renderTabs(){

let html=""

Object.keys(data.rooms).forEach(r=>{
html+=`<span class="roomTab" onclick="openRoom('${r}')">${r}</span>`
})

document.getElementById("roomTabs").innerHTML=html

}

function addRoom(){

let name=prompt("Room name")

if(!name)return

data.rooms[name]={measurements:{},electrical:{},room:{},walls:{}}

renderTabs()

}

function openRoom(room){

let r=data.rooms[room]

let html=`<h3>${room}</h3>`

html+=`<div class="sectionHeader">Ceiling Height</div>

<div class="grid">
<input value="${r.measurements.nw||''}" placeholder="NW" oninput="saveMeasure('${room}','nw',this.value)">
<input value="${r.measurements.ne||''}" placeholder="NE" oninput="saveMeasure('${room}','ne',this.value)">
<input value="${r.measurements.se||''}" placeholder="SE" oninput="saveMeasure('${room}','se',this.value)">
<input value="${r.measurements.sw||''}" placeholder="SW" oninput="saveMeasure('${room}','sw',this.value)">
<input value="${r.measurements.center||''}" placeholder="Center" oninput="saveMeasure('${room}','center',this.value)">
</div>`

html+=`<div class="sectionHeader">Electrical</div>

<table>
<tr>
<th>Wall</th>
<th>4M</th>
<th>6M</th>
<th>8M</th>
<th>12M</th>
</tr>`

walls.forEach(w=>{
let e=r.electrical[w]||{}
html+=`<tr>
<td>${w}</td>
<td><input value="${e['4M']||''}" oninput="saveElec('${room}','${w}','4M',this.value)"></td>
<td><input value="${e['6M']||''}" oninput="saveElec('${room}','${w}','6M',this.value)"></td>
<td><input value="${e['8M']||''}" oninput="saveElec('${room}','${w}','8M',this.value)"></td>
<td><input value="${e['12M']||''}" oninput="saveElec('${room}','${w}','12M',this.value)"></td>
</tr>`
})

html+="</table>"

html+=`<div class="sectionHeader">Room Observations</div>`

roomQuestions.forEach(q=>{
let v=r.room[q]||{}
html+=`<div class="question">

<label>${q}</label>

<select oninput="saveRoom('${room}','${q}',this.value)">
<option></option>
<option ${v.answer=="Yes"?"selected":""}>Yes</option>
<option ${v.answer=="No"?"selected":""}>No</option>
<option ${v.answer=="N.A"?"selected":""}>N.A</option>
</select>

<textarea placeholder="Add Comments" oninput="saveRoomComment('${room}','${q}',this.value)">${v.comment||""}</textarea>

</div>`
})

html+=`<div class="sectionHeader">Wall Observations</div>`

wallQuestions.forEach(q=>{
let v=r.walls[q]||{}
html+=`<div class="question">

<label>${q}</label>

<select oninput="saveWall('${room}','${q}','answer',this.value)">
<option></option>
<option ${v.answer=="Yes"?"selected":""}>Yes</option>
<option ${v.answer=="No"?"selected":""}>No</option>
<option ${v.answer=="N.A"?"selected":""}>N.A</option>
</select>

<select multiple oninput="saveWallWalls('${room}','${q}',this)">
<option ${v.walls?.includes("NW")?"selected":""}>NW</option>
<option ${v.walls?.includes("EW")?"selected":""}>EW</option>
<option ${v.walls?.includes("SW")?"selected":""}>SW</option>
<option ${v.walls?.includes("WW")?"selected":""}>WW</option>
</select>

<textarea placeholder="Add Comments" oninput="saveWall('${room}','${q}','comment',this.value)">${v.comment||""}</textarea>

</div>`
})

document.getElementById("roomForm").innerHTML=html

}

function saveMeasure(r,k,v){data.rooms[r].measurements[k]=v}

function saveElec(r,w,t,v){
if(!data.rooms[r].electrical[w])data.rooms[r].electrical[w]={}
data.rooms[r].electrical[w][t]=v
}

function saveRoom(r,q,v){
if(!data.rooms[r].room[q])data.rooms[r].room[q]={}
data.rooms[r].room[q].answer=v
}

function saveRoomComment(r,q,v){
if(!data.rooms[r].room[q])data.rooms[r].room[q]={}
data.rooms[r].room[q].comment=v
}

function saveWall(r,q,t,v){
if(!data.rooms[r].walls[q])data.rooms[r].walls[q]={}
data.rooms[r].walls[q][t]=v
}

function saveWallWalls(r,q,e){
let s=[...e.selectedOptions].map(o=>o.value)
if(!data.rooms[r].walls[q])data.rooms[r].walls[q]={}
data.rooms[r].walls[q].walls=s
}

function generateExcel(){

let measurements=[]
let electrical=[]
let roomObs=[]
let wallObs=[]

Object.keys(data.rooms).forEach(room=>{

let r=data.rooms[room]

Object.entries(r.measurements).forEach(([k,v])=>{
measurements.push({Room:room,Measurement:k,Value:v})
})

Object.entries(r.electrical).forEach(([wall,val])=>{
Object.entries(val).forEach(([k,v])=>{
electrical.push({Room:room,Wall:wall,Module:k,Value:v})
})
})

Object.entries(r.room).forEach(([q,v])=>{
roomObs.push({Room:room,Question:q,Answer:v.answer,Comment:v.comment})
})

Object.entries(r.walls).forEach(([q,v])=>{
wallObs.push({Room:room,Question:q,Answer:v.answer,Walls:(v.walls||[]).join(","),Comment:v.comment})
})

})

let wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(measurements),"Measurements")
XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(electrical),"Electrical")
XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(roomObs),"Room Observations")
XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(wallObs),"Wall Observations")

XLSX.writeFile(wb,"site_validation.xlsx")

}

function fillTestData(){

pid.value="TEST001"
cx.value="Test Customer"

Object.keys(data.rooms).forEach(room=>{
data.rooms[room].measurements={nw:3050,ne:3050,se:3050,sw:3050,center:3050}

roomQuestions.forEach(q=>{
data.rooms[room].room[q]={answer:"No",comment:"OK"}
})

wallQuestions.forEach(q=>{
data.rooms[room].walls[q]={answer:"No",walls:["NW"],comment:"OK"}
})

})

alert("Test data loaded")

}

function clearAllData(){
location.reload()
}

init()

</script>

</body>
</html>
