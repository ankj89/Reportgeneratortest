<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Validation Report Generator</title>

<script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;background:#f4f6fb;padding:20px}
.card{background:#fff;padding:20px;border-radius:10px;max-width:650px;margin:auto}
button{padding:10px 16px;background:#1e3d8f;color:white;border:none;border-radius:6px;margin-top:10px;cursor:pointer;margin-right:8px}
.section{margin-top:30px;page-break-before:always}
.section:first-child{page-break-before:auto}
.logo{font-size:22px;font-weight:bold;margin-bottom:20px}
table{border-collapse:collapse;width:100%}
th,td{border:1px solid #ccc;padding:8px}
th{background:#1e3d8f;color:#fff;font-weight:bold}
.header{background:#eef2ff;font-weight:bold}
.hidden{display:none}
</style>
</head>

<body>

<div class="card">
<h2>Validation Report Generator</h2>

<input type="file" id="fileInput" accept=".xlsx" />
<br>

<button id="generateBtn">Generate Report</button>
<button id="saveBtn" class="hidden">Save Insights</button>
<button id="resetBtn">Reset</button>

<div id="postFinalize" class="hidden">
<button id="pdfBtn">Download PDF</button>
<button id="excelBtn">Download Excel</button>
<button id="editBtn">Edit Insights</button>
</div>

</div>

<div id="reportPreview"></div>

<script>

function bindEvents(){
  document.getElementById("generateBtn").onclick = processFile
  document.getElementById("saveBtn").onclick = saveInsights
  document.getElementById("pdfBtn").onclick = downloadPDF
  document.getElementById("excelBtn").onclick = downloadExcel
  document.getElementById("editBtn").onclick = enableEditing
  document.getElementById("resetBtn").onclick = resetApp
}

let insightsData = []
let measData = []
let matrixDataRaw = []
let projectDataRaw = {}

function formatLabel(key){
  return key.replace(/([A-Z])/g,' $1').replace(/_/g,' ').replace(/^./,c=>c.toUpperCase())
}

function processFile(){

let file = document.getElementById("fileInput").files[0]
if(!file){ alert("Upload file first"); return }

let reader = new FileReader()

reader.onload = function(e){

let data = new Uint8Array(e.target.result)
let wb = XLSX.read(data,{type:'array'})

let rawSheet = wb.Sheets[wb.SheetNames[0]]
let measSheet = wb.Sheets[wb.SheetNames[1]]

let raw = XLSX.utils.sheet_to_json(rawSheet)
let meas = measSheet ? XLSX.utils.sheet_to_json(measSheet) : []

measData = meas
matrixDataRaw = raw
projectDataRaw = raw[0] || {}

let rooms = [...new Set(raw.map(r=>r.Room))]

let html = `<div id="reportContainer">`
html += `<div class="logo">SITE VALIDATION REPORT</div>`

html += `<div class="section"><h2>Project Details</h2><table>`
html += `<tr><th>Display Name</th><th>Value</th></tr>`

Object.keys(projectDataRaw).forEach(k=>{
if(!["Room","Section","Item","Value"].includes(k)){
html += `<tr><td>${formatLabel(k)}</td><td>${projectDataRaw[k]}</td></tr>`
}
})
html += `</table></div>`

html += `<div class="section"><h2>Validation Matrix</h2><table>`
html += `<tr><th>Question</th>`
rooms.forEach(r=>html+=`<th>${r}</th>`)
html += `</tr>`

let wallRows = raw.filter(r=>r.Section==="Wall")
let roomRows = raw.filter(r=>r.Section==="Room")

let wallQuestions = [...new Set(wallRows.map(r=>r.Item))]
let roomQuestions = [...new Set(roomRows.map(r=>r.Item))]

html += `<tr class="header"><td colspan="${rooms.length+1}">WALL VALIDATION</td></tr>`
wallQuestions.forEach(q=>{
html += `<tr><td>${q}</td>`
rooms.forEach(room=>{
let rec = wallRows.find(r=>r.Room===room && r.Item===q)
let val = rec ? [rec.Value,rec.Comments].filter(x=>x).join(" | ") : ""
html += `<td>${val}</td>`
})
html += `</tr>`
})

html += `<tr class="header"><td colspan="${rooms.length+1}">ROOM VALIDATION</td></tr>`
roomQuestions.forEach(q=>{
html += `<tr><td>${q}</td>`
rooms.forEach(room=>{
let rec = roomRows.find(r=>r.Room===room && r.Item===q)
let val = rec ? [rec.Value,rec.Comments].filter(x=>x).join(" | ") : ""
html += `<td>${val}</td>`
})
html += `</tr>`
})

html += `</table></div>`

html += `<div class="section"><h2>Insights</h2><table id="insightTable">`
html += `<tr><th>SNo</th>`
rooms.forEach(r=>html+=`<th>${r}</th>`)
html += `</tr>`

for(let i=1;i<=25;i++){
html += `<tr><td>${i}</td>`
rooms.forEach(()=>{ html += `<td contenteditable="true"></td>` })
html += `</tr>`
}
html += `</table></div>`

html += `<div class="section"><h2>Measurements</h2><table>`
if(meas.length){
let keys = Object.keys(meas[0]).filter(k=>k!=="Room")
html += `<tr><th>Measurement</th>`
rooms.forEach(r=>html+=`<th>${r}</th>`)
html += `</tr>`

keys.forEach(k=>{
html += `<tr><td>${formatLabel(k)}</td>`
rooms.forEach(room=>{
let rec = meas.find(m=>m.Room===room)
html += `<td>${rec ? rec[k] : ""}</td>`
})
html += `</tr>`
})
}
html += `</table></div>`

html += `</div>`

document.getElementById("reportPreview").innerHTML = html

document.getElementById("generateBtn").classList.add("hidden")
document.getElementById("saveBtn").classList.remove("hidden")

}

reader.readAsArrayBuffer(file)
}

function saveInsights(){
let table = document.getElementById("insightTable")
let headers = Array.from(table.rows[0].cells).map(c=>c.innerText)

insightsData = []

for(let i=1;i<table.rows.length;i++){
let row = table.rows[i]
let obj = {}
for(let j=0;j<row.cells.length;j++){
obj[headers[j]] = row.cells[j].innerText
}
insightsData.push(obj)
}

document.querySelectorAll("[contenteditable]").forEach(el=>el.removeAttribute("contenteditable"))

document.getElementById("saveBtn").classList.add("hidden")
document.getElementById("postFinalize").classList.remove("hidden")
}

function enableEditing(){
document.querySelectorAll("#insightTable td:not(:first-child)").forEach(el=>{
el.setAttribute("contenteditable","true")
})
document.getElementById("postFinalize").classList.add("hidden")
document.getElementById("saveBtn").classList.remove("hidden")
}

function downloadPDF(){
  const content = document.getElementById("reportContainer").outerHTML;
  const w = window.open();

  w.document.write(`
  <html>
  <head>
  <title>Validation Report</title>
  <style>
    body{font-family:Arial, Helvetica, sans-serif; padding:24px; color:#111}

    h2{margin:0 0 10px 0}

    .logo{font-size:22px;font-weight:bold;margin-bottom:20px}

    .section{page-break-before:always; margin-top:24px}
    .section:first-child{page-break-before:auto}

    table{
      border-collapse:collapse;
      width:100%;
      table-layout:fixed;
      margin-top:10px;
    }

    th, td{
      border:1.5px solid #000;
      padding:8px 10px;
      font-size:12px;
      vertical-align:top;
      word-wrap:break-word;
      white-space:pre-wrap;
    }

    th{
      background:#1e3d8f;
      color:#fff;
      font-weight:bold;
      text-align:left;
    }

    .header td{
      background:#e6ecff;
      font-weight:bold;
      text-align:left;
    }

    /* Improve readability */
    tr:nth-child(even) td{ background:#fafbff }

    /* Prevent row breaking awkwardly */
    tr{ page-break-inside:avoid }

  </style>
  </head>
  <body>
  ${content}
  </body>
  </html>
  `);

  setTimeout(()=>{
    w.print();
  },500);
}

function downloadExcel(){
  const wb = XLSX.utils.book_new();

  // ---------- 1) Insights ----------
  const wsInsights = XLSX.utils.json_to_sheet(insightsData || []);
  autoFit(wsInsights);
  XLSX.utils.book_append_sheet(wb, wsInsights, "Insights");

  // ---------- 2) Measurements (pivoted by Room) ----------
  const measPivot = buildMeasurementsPivot();
  const wsMeas = XLSX.utils.json_to_sheet(measPivot);
  autoFit(wsMeas);
  XLSX.utils.book_append_sheet(wb, wsMeas, "Measurements");

  // ---------- 3) Project Details ----------
  const projArr = [];
  Object.keys(projectDataRaw || {}).forEach(k=>{
    if(!["Room","Section","Item","Value"].includes(k)){
      projArr.push({"Display Name": formatLabel(k), "Value": projectDataRaw[k]});
    }
  });
  const wsProj = XLSX.utils.json_to_sheet(projArr);
  autoFit(wsProj);
  XLSX.utils.book_append_sheet(wb, wsProj, "Project Details");

  // ---------- 4) Validation Matrix (pivot + grouping) ----------
  const matrix = buildMatrixPivot();
  const wsMatrix = XLSX.utils.json_to_sheet(matrix);
  autoFit(wsMatrix);
  XLSX.utils.book_append_sheet(wb, wsMatrix, "Validation Matrix");

  XLSX.writeFile(wb, "Validation_Report.xlsx");
}

// ---------- Helpers ----------
function buildMatrixPivot(){
  const rows = matrixDataRaw || [];
  const rooms = [...new Set(rows.map(r=>r.Room))];

  function build(section){
    const subset = rows.filter(r=>r.Section===section);
    const questions = [...new Set(subset.map(r=>r.Item))];
    const out = [];
    questions.forEach(q=>{
      const obj = { Question: q };
      rooms.forEach(room=>{
        const rec = subset.find(r=>r.Room===room && r.Item===q);
        obj[room] = rec ? [rec.Value, rec.Comments].filter(Boolean).join(" | ") : "";
      });
      out.push(obj);
    });
    return out;
  }

  const finalArr = [];
  finalArr.push({ Question: "WALL VALIDATION" });
  finalArr.push(...build("Wall"));
  finalArr.push({ Question: "ROOM VALIDATION" });
  finalArr.push(...build("Room"));
  return finalArr;
}

function buildMeasurementsPivot(){
  const rows = measData || [];
  if(!rows.length) return [];
  const rooms = [...new Set(rows.map(r=>r.Room))];
  const keys = Object.keys(rows[0]).filter(k=>k!=="Room");

  const out = [];
  keys.forEach(k=>{
    const obj = { Measurement: formatLabel(k) };
    rooms.forEach(room=>{
      const rec = rows.find(r=>r.Room===room);
      obj[room] = rec ? (rec[k] ?? "") : "";
    });
    out.push(obj);
  });
  return out;
}

function autoFit(ws){
  if(!ws || !ws['!ref']) return;
  const range = XLSX.utils.decode_range(ws['!ref']);
  const colWidths = [];
  for(let C = range.s.c; C <= range.e.c; C++){
    let maxLen = 10;
    for(let R = range.s.r; R <= range.e.r; R++){
      const cell = ws[XLSX.utils.encode_cell({r:R, c:C})];
      if(cell && cell.v != null){
        const len = String(cell.v).length;
        if(len > maxLen) maxLen = len;
      }
    }
    colWidths.push({ wch: Math.min(maxLen + 2, 60) });
  }
  ws['!cols'] = colWidths;
}

function resetApp(){ location.reload() }

document.addEventListener("DOMContentLoaded", bindEvents)

</script>

</body>
</html>
