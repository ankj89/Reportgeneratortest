<script>

var insightsData = [];
var measData = [];
var matrixDataRaw = [];

var societyData = [];

function norm(str){return (str||"").toLowerCase().replace(/[^a-z0-9]/g,"");}
function classifyInsight(text){

let t = (text || "").toLowerCase();

/* TYPE */
let type = "";

if(t.includes("design") || t.includes("suggested") || t.includes("recommended")){
type = "Design Input";
}
else if(t.includes("charges") || t.includes("cost") || t.includes("additional")){
type = "Cost Input";
}
else{
type = "Execution Input";
}

/* CATEGORY */
let category = "";

if(t.includes("plaster") || t.includes("civil") || t.includes("wall") || t.includes("floor")){
category = "Civil";
}
else if(t.includes("electrical") || t.includes("wiring") || t.includes("switch")){
category = "Electrical";
}
else if(t.includes("plumbing") || t.includes("water") || t.includes("drain")){
category = "Plumbing";
}
else if(t.includes("carpentry") || t.includes("wood") || t.includes("wardrobe")){
category = "Carpentry";
}
else if(t.includes("paint") || t.includes("polish")){
category = "Paint";
}
else if(t.includes("false ceiling") || t.includes("ceiling")){
category = "False Ceiling";
}
else{
category = "";
}

return {type, category};

}  

/* ---------------- RULE ENGINE CONFIG ---------------- */

/* ================= SOCIETY RULES ================= */
const RULES = [

/* ================= SOCIETY ================= */

{
id:"PROPERTY_OLD",
type:"society",
condition:{questionIncludes:"type of property",valueEquals:"more than 15"},
output:()=> "Old property. Higher probability of civil, plumbing and electrical rework"
},

{
id:"SERVICE_LIFT",
type:"society",
condition:{questionIncludes:"service lift"},

if(val.includes("not present") || val.includes("no material")){
return "Service lift not available. Manual lifting charges applicable";
}

if(val.includes("not allowed")){
return "Service lift available but heavy material movement not allowed. Manual handling charges applicable";

}
},

{
id:"LIFT_TIME",
type:"society",
condition:{questionIncludes:"permissible time"},

},

{
id:"LOADING_NO",
type:"society",
condition:{questionIncludes:"loading/unloading space",valueEquals:"no"},
output:()=> "Loading/unloading area not available. Manual handling and long lead charges applicable"
},

{
id:"LOADING_DISTANCE",
type:"society",
condition:{questionIncludes:"distance of loading"},
output:(s)=>{
let val=Number(s.Value);
if(!val) return null;
if(val>30){
return `Loading/unloading area is located ${val} ft from site. Additional long lead charges applicable`;

return null;
}
},

{
id:"DEMOLITION",
type:"society",
condition:{questionIncludes:"demolition",valueEquals:"manual"},
output:()=> "Only manual demolition allowed. Additional charges for manual demolition applicable."
},

{
id:"SCAFFOLDING_HEIGHT",
type:"measurement",
condition:{fields:["fc1","fc2","fc3","fc4","fc5"]},
output:(v)=>{

let vals = v.map(Number).filter(x=>x>0);
if(!vals.length) return null;

/* MAX HEIGHT */
let max = Math.max(...vals);

/* 10 ft = 3048 mm */
if(max > 3048){

},

{
id:"OUTSTATION",
type:"society",
condition:{questionIncludes:"outstation",valueEquals:"yes"},
output:()=> "Site is located inthe outskirts. Outstation charges applicable"
},

{
id:"LIFT_HEIGHT",
type:"society",
condition:{questionIncludes:"height of service lift",valueEquals:"<7"},
output:(s)=>{

},

{
id:"LIFT_DEPTH",
type:"society",
condition:{questionIncludes:"depth of service lift",valueEquals:"<4"},
output:(s)=>{
let val = s.Value || "";
return `Service lift depth is ${val}. Sufficient depth not available. Manual lifting charges maybe applicable`;
}
},

{
id:"LIFT_LENGTH",
type:"society",
condition:{questionIncludes:"length of service lift",valueEquals:"<3"},
output:(s)=>{
let val = s.Value || "";
return `Service lift length is ${val}. Sufficient length not available. Manual lifting charges maybe applicable`;
}
},

{
id:"VEHICLE_NO",
type:"society",
condition:{questionIncludes:"vehicle entry",valueEquals:"no"},
output:()=> "Vehicle entry not allowed. Additional loading/unloading charges applicable"
},

{
id:"VEHICLE_CONSTRAINT",
type:"society",
condition:{questionIncludes:"vehicle"},
output:(s)=>{

id:"STAIR_WIDTH",
type:"society",
condition:{questionIncludes:"staircase width"},

let val=Number(s.Value);
if(!val) return null;
if(val<4){
return `Staircase width is ${val} ft. Access constrained for movement`;
}
return null;
}
},

{
id:"NO_WATER",
type:"society",
condition:{questionIncludes:"water supply",valueEquals:"no"},
output:()=> "No active water supply available at site.Inform Cx."
},

{
id:"NO_POWER",
type:"society",
condition:{questionIncludes:"power supply",valueEquals:"no"},
output:()=> "No active power supply available at site.Inform Cx. "
},

{
id:"GAS_LINE",
type:"society",
condition:{questionIncludes:"gas line",valueEquals:"no"},
output:()=> "CNG gas line not provided till site location."
},

{
id:"DG",
type:"society",
condition:{questionIncludes:"backup",valueEquals:"no"},
output:()=> "Backup power not available.Check with Cx for inverter planning."
},

{
id:"NOC",
type:"society",
condition:{questionIncludes:"permission",valueEquals:"yes"},
output:()=> "Society/builder permission required before starting work"
},

{
id:"POLICE",
type:"society",
condition:{questionIncludes:"police",valueEquals:"yes"},
output:()=> "Police verification required for labour before start of the works"
},

{
id:"WORK_TIME",
type:"society",
condition:{questionIncludes:"work days"},
output:(s)=> s.Value ? `Permissible work timings: ${s.Value}` : null
},

{
id:"MATERIAL",
type:"society",
condition:{questionIncludes:"material"},
output:(s)=> s.Value ? `Material restrictions: ${s.Value}` : null
},

/* ================= ROOM ================= */

{
id:"FLOOR_BAD",
type:"room",
condition:{itemIncludes:"flooring",valueEquals:"no"},
output:()=> "Flooring not in good condition. Replacement required"
},

{
id:"FALSE_CEILING",
type:"room",
condition:{itemIncludes:"false ceiling",valueEquals:"yes"},
output:()=> "Existing false ceiling not in good condition. Demolition recommended"
},

{
id:"WIRING",
type:"room",
condition:{itemIncludes:"wiring",valueEquals:"no"},
output:()=> "Existing wiring is not in good condition. Re-wiring is recommended"
},
{
id:"LOAD",
type:"room",
condition:{itemIncludes:"load capacity",valueEquals:"no"},
output:()=> "Existing wiring does not have sufficient capacity to take additional load. Re-wiring is suggested"
},

{
id:"PLUMBING",
type:"room",
condition:{itemIncludes:"plumbing lines",valueEquals:"yes"},
output:()=> "Existing plumbing lines are not in good condition. Recommend replacement/new plumbing"
},
{
id:"NOPLUMBING",
type:"room",
condition:{itemIncludes:"plumbing point available",valueEquals:"no"},
output:()=> "Plumbing points not available. Design for new point or relocation or extension if required"
},  
{
id:"PLUMBINGTYPE",
type:"room",
condition:{itemIncludes:"cpvc",valueEquals:"no"},
output:()=> "Existing plumbing lines are not UPVC/CPVC. Recommend replacement/new plumbing"
},  

{
id:"VALVE",
type:"room",
condition:{itemIncludes:"inlet valve",valueEquals:"no"},
output:()=> "Main inlet valve not accessible"
},

{
id:"BED",
type:"room",
condition:{itemIncludes:"bed with drawers",valueEquals:"no"},
output:()=> "Insufficient space for bed with side drawers. Box storage design recomended."
},
{
id:"WARDROBESHUTTER",
type:"room",
condition:{itemIncludes:"swing shutters",valueEquals:"no"},
output:()=> "Insufficient space for swing shutters in wardrobe/storages. Sliding shutter recomended."
},  

/* ================= WALL ================= */

{
id:"LOAD_BEARING",
type:"wall",
condition:{itemIncludes:"load-bearing",valueEquals:"yes"},
output:(m)=>`RCC walls (${m.map(x=>x.Walls).join(", ")}) detected. No demolition or chiselling allowed. Wall panelling required for any electrical works`
},

{
id:"DRY_WALL",
type:"wall",
condition:{itemIncludes:"dry wall",valueEquals:"yes"},
output:(m)=>`Dry walls (${m.map(x=>x.Walls).join(", ")}) detected. Bison board panelling or ply support required incase we are doing any carpentry work on the wall`
},

{
id:"NICHES",
type:"wall",
condition:{itemIncludes:"niches",valueEquals:"yes"},
output:(m)=>`Niches present on walls (${m.map(x=>x.Walls).join(", ")}).Ply packing cost to be added in case of levelling/flushing.`
},

{
id:"STRUCTURAL_CRACK",
type:"wall",
condition:{itemIncludes:"structural crack",valueEquals:"yes"},
output:(m)=>`Structural cracks observed on walls (${m.map(x=>x.Walls).join(", ")}). Need suitable treatment(under Cx Scope)`
},

{
id:"HAIRLINE",
type:"wall",
condition:{itemIncludes:"hairline crack",valueEquals:"yes"},
output:(m)=>`Hairline cracks/loose plaster observed on walls (${m.map(x=>x.Walls).join(", ")}). Re-plastering required`
},

{
id:"SEEPAGE",
type:"wall",
condition:{itemIncludes:"seepage",valueEquals:"yes"},
output:(m)=>`Seepage observed on walls (${m.map(x=>x.Walls).join(", ")}). Waterproofing/Damproofing required before strat of works(under Cx scope)`
},

{
id:"AC_POINT",
type:"wall",
condition:{itemIncludes:"ac point",valueEquals:"no"},
output:()=> "AC point not available. Lowside works required"
},

{
id:"DARK_SHADE",
type:"wall",
condition:{itemIncludes:"darker shade",valueEquals:"yes"},
output:(m)=>`Dark shade on walls (${m.map(x=>x.Walls).join(", ")}). Repainting not recommended with lighter shade.Fresh paintto be considered`
},

/* ================= MEASUREMENT ================= */

{
id:"ROOM_DIAGONAL",
type:"measurement",
condition:{fields:["diag1","diag2"]},
output:(v)=>{
let a=Number(v[0]), b=Number(v[1]);
if(!a||!b) return null;
let diff=Math.abs(a-b);

if(diff>20) return "Room walls are not in level. Room diagonal deviation > 20 mm so plastering will be required";
if(diff>=10) return "Room walls are not in level.Room diagonals deviation 10–25mm. Punning required";

return null;
}
},

{
id:"CEILING_VARIATION",
type:"measurement",
condition:{fields:["fc1","fc2","fc3","fc4","fc5"]},
output:(v)=>{
let nums=v.map(Number).filter(x=>x>0);
if(nums.length<2) return null;

let diff=Math.max(...nums)-Math.min(...nums);
if(diff>20) return "True ceiling level (corners and center) deviation of > 20 mm observed across. Only flat false ceiling is suggested or keep the ceiling exposed. No peripheral ceiling to be done";

return null;
}
},

{
id:"CLEAR_HEIGHT_ADV",
type:"measurement",
condition:{fields:["beamFloor","sprinklerFloor","fc1","fc2","fc3","fc4","fc5","doorsoffitNW","doorsoffitEW","doorsoffitSW","doorsoffitWW","winSoffitNW","winSoffitEW","winSoffitSW","winSoffitWW"]},
output:(v,m)=>{

/* ---------------- BASE HEIGHTS ---------------- */

let fcVals = [m.fc1,m.fc2,m.fc3,m.fc4,m.fc5].map(Number).filter(x=>x>0);
if(!fcVals.length) return null;

let fcMin = Math.min(...fcVals);

let beam = Number(m.beamFloor)||0;
let sprinkler = Number(m.sprinklerFloor)||0;

/* ---------------- MESSAGES ---------------- */

let msgs = [];

/* FLOOR TO CEILING */
msgs.push(`Floor to ceiling clear height: ${fcMin} mm`);

/* BEAM */
if(beam>0){
msgs.push(`Offset beam present. Clear height at beam: ${beam} mm`);
}

/* SPRINKLER / UTILITIES */
if(sprinkler>0){
msgs.push(`Utilities/sprinkler/HVAC line present. Clear height: ${sprinkler} mm`);
}

/* ---------------- EFFECTIVE HEIGHT ---------------- */

/* take minimum of all valid */
let validHeights = [fcMin, beam, sprinkler].filter(x=>x>0);
let effective = Math.min(...validHeights);

/* ---------------- FALSE CEILING CALC ---------------- */

/* target clear height = 8 ft = 2440 mm */
let target = 2440;

/* max drop allowed */
let maxDrop = effective - target;

/* minimum drop (practical service gap) */
let minDrop = 75;  // can adjust to 75–100

let dropMsg = `Recommended false ceiling drop: ${minDrop} mm to ${maxDrop} mm`;

/* ---------------- VALIDATIONS ---------------- */

if(maxDrop < 75){
dropMsg = `Available depth only ${maxDrop} mm. False ceiling not recommended`;
}

msgs.push(dropMsg);

/* ---------------- AC POCKET LOGIC ---------------- */

let acWalls = [];

[
["NW", m.doorsoffitNW, m.winSoffitNW],
["EW", m.doorsoffitEW, m.winSoffitEW],
["SW", m.doorsoffitSW, m.winSoffitSW],
["WW", m.doorsoffitWW, m.winSoffitWW]
].forEach(([w,d1,d2])=>{

let v1 = Number(d1)||0;
let v2 = Number(d2)||0;

/* available drop space */
let available = Math.min(
v1>0?v1:9999,
v2>0?v2:9999
);

/* if available < required drop */
if(available < (minDrop + 100)){ // 100 buffer for AC piping
acWalls.push(w);
}

});

if(acWalls.length){
msgs.push(`AC pocket required on walls ${acWalls.join(", ")} due to insufficient soffit depth`);
}

/* ---------------- FINAL ---------------- */

return msgs.join(" | ");

}
},

{
id:"DOOR_SIZE",
type:"measurement",
condition:{fields:["doorheight","doorwidth"]},
output:(v)=>{
let h=Number(v[0]), w=Number(v[1]);
if(!h||!w) return null;

if(h<2440 || w<900){
return `Available Door size (${h}x${w} mm). Design furniture accordingly`;
}
if(h>2440){
return "Door height more than 8ft observed";
}
return null;
}
},

{
id:"SOFFIT_AC",
type:"measurement",
condition:{fields:["doorsoffitNW","doorsoffitEW","doorsoffitSW","doorsoffitWW","winSoffitNW","winSoffitEW","winSoffitSW","winSoffitWW"]},
output:(v,m)=>{
let walls=[];

[
["NW",m.doorsoffitNW,m.winSoffitNW],
["EW",m.doorsoffitEW,m.winSoffitEW],
["SW",m.doorsoffitSW,m.winSoffitSW],
["WW",m.doorsoffitWW,m.winSoffitWW]
].forEach(([w,a,b])=>{
if((a>0&&a<800)||(b>0&&b<800)) walls.push(w);
});

if(!walls.length) return null;

return `AC space constraint on walls ${walls.join(", ")}. False ceiling pocket required`;
}
},

{
id:"WALL_UNDULATION",
type:"measurement",
condition:{fields:["undNW","undEW","undSW","undWW"]},
output:(v,m)=>{
let msgs=[];

[
["NW",m.undNW],
["EW",m.undEW],
["SW",m.undSW],
["WW",m.undWW]
].forEach(([w,val])=>{
let x=Number(val)||0;

if(x>5 && x<=20){
msgs.push(`${w}: Undulation 5–20mm. Punning required`);
}
else if(x>20){
msgs.push(`${w}: Undulation >20mm. Plastering required`);
}
});

return msgs.length ? msgs.join(" | ") : null;
}
}

];

function runRuleEngine(rooms){
let insights=[];

RULES.forEach(rule=>{

if(rule.type==="wall"||rule.type==="room"){
rooms.forEach(room=>{
let matches=matrixDataRaw.filter(x=>
x.Room===room &&
norm(x.Item).includes(norm(rule.condition.itemIncludes)) &&
(
!rule.condition.valueEquals ||
norm(x.Value||"").includes(norm(rule.condition.valueEquals))
)
);
if(matches.length){
let res=rule.output(matches);
if(res) insights.push({room,text:res});
}
});
}

if(rule.type==="measurement"){
measData.forEach(m=>{
if(!m.Room) return;
let vals=rule.condition.fields.map(f=>m[f]||null);
let res=rule.output(vals,m);
if(res) insights.push({room:m.Room,text:res});
});
}

if(rule.type==="society"){
societyData.forEach(s=>{

/* QUESTION MATCH (MANDATORY) */
if(!norm(s.Question).includes(norm(rule.condition.questionIncludes))) return;

/* VALUE MATCH (ONLY IF PRESENT) */
if(rule.condition.valueEquals){
if(!norm(s.Value||"").includes(norm(rule.condition.valueEquals))) return;
}

/* RUN RULE */
let res = rule.output(s);
if(res) insights.push({room:"All",text:res});

});
}

});

return insights;
}

function bindEvents(){
document.getElementById("generateBtn").onclick = processFile;
document.getElementById("saveBtn").onclick = saveInsights;
document.getElementById("editBtn").onclick = enableEditing;
document.getElementById("excelBtn").onclick = downloadExcel;
document.getElementById("pdfBtn").onclick = downloadPDF;
}

function getUnique(arr,key){ return [...new Set(arr.map(x=>x[key]))]; }

function addInsightRow(tableId){

let table = document.getElementById(tableId);
if(!table) return;

let row = table.insertRow();
let rowCount = table.rows.length - 1;

/* SNo */
let cell0 = row.insertCell(0);
cell0.innerText = rowCount;

/* Other columns */
for(let i=1;i<5;i++){
let cell = row.insertCell(i);
cell.contentEditable = "true";
cell.innerText = "";
}
}
function saveInsights(){

insightsData = [];

let tables = document.querySelectorAll("table");

tables.forEach(table=>{

if(!table.id || !table.id.includes("Table")) return;

for(let i=1;i<table.rows.length;i++){

let row = table.rows[i];
let rowData = [];

for(let j=1;j<row.cells.length;j++){
rowData.push(row.cells[j].innerText.trim());
}

insightsData.push(rowData);

}

});

/* LOCK */
document.querySelectorAll("table[id*='Table'] td")
.forEach(td => td.removeAttribute("contenteditable"));

document.getElementById("saveBtn").classList.add("hidden");
document.getElementById("postFinalize").classList.remove("hidden");

alert("Insights saved successfully");
}
function enableEditing(){

document.querySelectorAll("table[id*='Table'] td")
.forEach(td => td.setAttribute("contenteditable","true"));

document.getElementById("saveBtn").classList.remove("hidden");
document.getElementById("postFinalize").classList.add("hidden");
}

function downloadExcel(){
let ws = XLSX.utils.aoa_to_sheet(insightsData);
let wb = XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb, ws, "Insights");
XLSX.writeFile(wb, "Insights.xlsx");
}

function downloadPDF(){

let content = document.getElementById("reportContainer").innerHTML;

let styles = document.querySelector("style").outerHTML;

let win = window.open('', '', 'height=700,width=900');

win.document.write(`
<html>
<head>${styles}</head>
<body>${content}</body>
</html>
`);

win.document.close();
win.print();

}

function processFile(){
let file=document.getElementById("fileInput").files[0];
if(!file){alert("Upload file first");return;}

let reader=new FileReader();
reader.onload=function(e){
let wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});

matrixDataRaw=XLSX.utils.sheet_to_json(wb.Sheets["Validation Data"]||{});
measData=XLSX.utils.sheet_to_json(wb.Sheets["Measurements"]||{});
societyData=XLSX.utils.sheet_to_json(wb.Sheets["Society Constraints"]||{});

let rooms=getUnique(matrixDataRaw,"Room");

let html='<div id="reportContainer"><div class="logo">SITE VALIDATION REPORT</div>';

/* PROJECT */
html+='<div class="section"><h2>Project Details</h2><table><tr><th>Field</th><th>Value</th></tr>';
let projectData = matrixDataRaw[0] || {};
for(let k in projectData){
if(!["Room","Section","Item","Value","Walls"].includes(k)){
html+=`<tr><td>${k}</td><td>${projectData[k]}</td></tr>`;
}}
html+='</table></div>';

/* SOCIETY */
if(societyData.length){
html+='<div class="section"><h2>Society Constraints</h2><table><tr><th>Question</th><th>Value</th></tr>';
let grouped={};
societyData.forEach(s=>{let cat=s.Category||"General";if(!grouped[cat]) grouped[cat]=[];grouped[cat].push(s);});
for(let cat in grouped){
html+=`<tr class="header"><td colspan="2">${cat}</td></tr>`;
grouped[cat].forEach(i=>html+=`<tr><td>${i.Question}</td><td>${i.Value||""}</td></tr>`);
}
html+='</table></div>';
}

/* MATRIX */
html+='<div class="section"><h2>Validation Matrix</h2><table><tr><th>Question</th>';
rooms.forEach(r=>html+=`<th>${r}</th>`);
html+='</tr>';
let qs=getUnique(matrixDataRaw,"Item");
qs.forEach(q=>{
html+=`<tr><td>${q}</td>`;
rooms.forEach(r=>{
let rec=matrixDataRaw.find(x=>x.Room===r&&x.Item===q)||{};
let val=rec.Value||"";
if(rec.Walls) val+=` (${rec.Walls})`;
html+=`<td>${val}</td>`;
});
html+='</tr>';
});
html+='</table></div>';

/* INSIGHTS */
/* ================= INSIGHTS ================= */

let autoInsights = runRuleEngine(rooms);

/* SPLIT */
let roomInsights = {};
let societyInsights = [];

rooms.forEach(r => roomInsights[r] = []);

autoInsights.forEach(i=>{
if(i.room === "All") societyInsights.push(i.text);
else roomInsights[i.room].push(i.text);
});

/* 🔷 HELPER */
function createInsightTable(title, dataArr, tableId){

let html = `<div class="section">
<h2>${title}</h2>

<button onclick="addInsightRow('${tableId}')">+ Add Row</button>

<table id="${tableId}">
<tr>
<th>SNo</th>
<th>Insights</th>
<th>Type of Insight</th>
<th>Category</th>
<th style="width:30%">Remarks</th>
</tr>`;

let rows = Math.max(dataArr.length, 5);

for(let i=0;i<rows;i++){

let txt = dataArr[i] || "";
let meta = classifyInsight(txt);

/* COLOR */
let rowClass = "";
if(meta.type === "Design Input") rowClass = "type-design";
else if(meta.type === "Cost Input") rowClass = "type-cost";
else rowClass = "type-execution";

/* HTML */
html += `<tr class="${rowClass}">
<td>${i+1}</td>
<td contenteditable="true">${txt}</td>
<td contenteditable="true">${meta.type}</td>
<td contenteditable="true">${meta.category}</td>
<td contenteditable="true" style="min-width:200px"></td>
</tr>`;

}

html += `</table></div>`;

return html;
}

/* SOCIETY */
html += createInsightTable("Society Insights", societyInsights, "societyTable");

/* ROOMS */
rooms.forEach((room, index)=>{
html += createInsightTable(`${room} Insights`, roomInsights[room], `roomTable_${index}`);
});

document.getElementById("reportPreview").innerHTML=html;
document.getElementById("saveBtn").classList.remove("hidden");
};
reader.readAsArrayBuffer(file);
}

document.addEventListener("DOMContentLoaded",bindEvents);

</script>

</body>
</html>
