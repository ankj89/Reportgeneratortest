<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Validation Report Generator</title>

<script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;background:#f4f6fb;padding:20px}
.card{background:#fff;padding:20px;border-radius:10px;max-width:650px;margin:auto}
button{padding:10px 16px;background:#1e3d8f;color:white;border:none;border-radius:6px;margin-top:10px;cursor:pointer;margin-right:8px}
.section{margin-top:30px;page-break-before:always}
.section:first-child{page-break-before:auto}
.logo{font-size:22px;font-weight:bold;margin-bottom:20px}
table{border-collapse:collapse;width:100%}
th,td{border:1px solid #ccc;padding:8px}
th{background:#1e3d8f;color:#fff;font-weight:bold}
.header{background:#eef2ff;font-weight:bold}
.hidden{display:none}
</style>
</head>

<body>

<div class="card">
<h2>Validation Report Generator</h2>

<input type="file" id="fileInput" accept=".xlsx" />
<br>

<button id="generateBtn">Generate Report</button>
<button id="saveBtn" class="hidden">Save Insights</button>
<button id="resetBtn">Reset</button>

<div id="postFinalize" class="hidden">
<button id="pdfBtn">Download PDF</button>
<button id="excelBtn">Download Excel</button>
<button id="editBtn">Edit Insights</button>
</div>

</div>

<div id="reportPreview"></div>

<script>

var insightsData = [];
var measData = [];
var matrixDataRaw = [];
var projectDataRaw = {};
var societyData = [];

function bindEvents(){
  document.getElementById("generateBtn").onclick = processFile;
  document.getElementById("saveBtn").onclick = saveInsights;
  document.getElementById("pdfBtn").onclick = downloadPDF;
  document.getElementById("excelBtn").onclick = downloadExcel;
  document.getElementById("editBtn").onclick = enableEditing;
  document.getElementById("resetBtn").onclick = resetApp;
}

function formatLabel(key){
  return key.replace(/([A-Z])/g,' $1').replace(/_/g,' ').replace(/^./,c=>c.toUpperCase());
}

function getUnique(arr, key){
  return [...new Set(arr.map(x=>x[key]))];
}

function processFile(){

var file = document.getElementById("fileInput").files[0];
if(!file){ alert("Upload file first"); return; }

var reader = new FileReader();

reader.onload = function(e){

var wb = XLSX.read(new Uint8Array(e.target.result),{type:'array'});

var raw = XLSX.utils.sheet_to_json(wb.Sheets["Validation Data"] || {});
var meas = XLSX.utils.sheet_to_json(wb.Sheets["Measurements"] || {});
societyData = XLSX.utils.sheet_to_json(wb.Sheets["Society Constraints"] || {});

if(!raw.length){ alert("No data found"); return; }

measData = meas;
matrixDataRaw = raw;
projectDataRaw = raw[0];

var rooms = getUnique(raw,"Room");

var html = '<div id="reportContainer">';
html += '<div class="logo">SITE VALIDATION REPORT</div>';

// PROJECT DETAILS
html += '<div class="section"><h2>Project Details</h2><table>';
html += '<tr><th>Display Name</th><th>Value</th></tr>';

for(var k in projectDataRaw){
  if(!["Room","Section","Item","Value"].includes(k)){
    html += `<tr><td>${formatLabel(k)}</td><td>${projectDataRaw[k]}</td></tr>`;
  }
}
html += '</table></div>';

// SOCIETY
if(societyData.length){
html += '<div class="section"><h2>Society Constraints</h2><table>';
html += '<tr><th>Question</th><th>Value</th></tr>';

let grouped = {};
societyData.forEach(x=>{
  let cat = x.Category || "Others";
  if(!grouped[cat]) grouped[cat]=[];
  grouped[cat].push(x);
});

for(let cat in grouped){
  html += `<tr class="header"><td colspan="3">${cat}</td></tr>`;
  grouped[cat].forEach(i=>{
    html += `<tr><td>${i.Question}</td><td>${i.Value||""}</td></tr>`;
  });
}
html += '</table></div>';
}

// VALIDATION MATRIX
html += '<div class="section"><h2>Validation Matrix</h2><table>';

html += '<tr><th>Question</th>';
rooms.forEach(r=> html += `<th>${r} (Result)</th><th>${r} (Comments)</th>`);
html += '</tr>';

function renderSection(title, section){
  html += `<tr class="header"><td colspan="${1+rooms.length*2}">${title}</td></tr>`;
  let subset = raw.filter(x=>x.Section===section);
  let questions = getUnique(subset,"Item");

  questions.forEach(q=>{
    html += `<tr><td>${q}</td>`;
    rooms.forEach(r=>{
      let rec = subset.find(x=>x.Room===r && x.Item===q) || {};
      html += `<td>${rec.Value||""}</td><td>${rec.Comments||""}</td>`;
    });
    html += '</tr>';
  });
}

renderSection("WALL VALIDATION","Wall");
renderSection("ROOM VALIDATION","Room");

html += '</table></div>';

// INSIGHTS
html += '<div class="section"><h2>Insights</h2><table id="insightTable">';
html += '<tr><th>SNo</th>';
rooms.forEach(r=> html += `<th>${r}</th>`);
html += '</tr>';

for(let i=1;i<=20;i++){
  html += '<tr><td>'+i+'</td>';
  rooms.forEach(()=> html += '<td contenteditable="true"></td>');
  html += '</tr>';
}
html += '</table></div>';

// MEASUREMENTS
html += '<div class="section"><h2>Measurements</h2><table>';
if(meas.length){
  let keys = Object.keys(meas[0]).filter(k=>k!=="Room");
  html += '<tr><th>Measurement</th>';
  rooms.forEach(r=> html += `<th>${r}</th>`);
  html += '</tr>';

  keys.forEach(k=>{
    html += `<tr><td>${formatLabel(k)}</td>`;
    rooms.forEach(r=>{
      let rec = meas.find(x=>x.Room===r)||{};
      html += `<td>${rec[k]||""}</td>`;
    });
    html += '</tr>';
  });
}
html += '</table></div>';

html += '</div>';

document.getElementById("reportPreview").innerHTML = html;
document.getElementById("generateBtn").classList.add("hidden");
document.getElementById("saveBtn").classList.remove("hidden");

};

reader.readAsArrayBuffer(file);
}

function saveInsights(){
var table = document.getElementById("insightTable");
var headers = [...table.rows[0].cells].map(c=>c.innerText);

insightsData = [];
for(var r=1;r<table.rows.length;r++){
  var obj = {};
  for(var c=0;c<table.rows[r].cells.length;c++){
    obj[headers[c]] = table.rows[r].cells[c].innerText;
  }
  insightsData.push(obj);
}

document.querySelectorAll("[contenteditable]").forEach(el=>el.removeAttribute("contenteditable"));

document.getElementById("saveBtn").classList.add("hidden");
document.getElementById("postFinalize").classList.remove("hidden");
}

function enableEditing(){
document.querySelectorAll("#insightTable td:not(:first-child)")
.forEach(td=>td.setAttribute("contenteditable","true"));
}

function downloadPDF(){
var content = document.getElementById("reportContainer").outerHTML;
var w = window.open();
w.document.write('<html><body>'+content+'</body></html>');
setTimeout(()=>w.print(),500);
}

function downloadExcel(){
var wb = XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(insightsData), "Insights");
XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(societyData), "Society Constraints");
XLSX.writeFile(wb, "Validation_Report.xlsx");
}

function resetApp(){ location.reload(); }

document.addEventListener("DOMContentLoaded", bindEvents);

</script>

</body>
</html>
