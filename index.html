<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Validation Report Generator</title>

<!-- ✅ FIX 1: Stable CDN -->
<script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;background:#f4f6fb;padding:20px}
.card{background:#fff;padding:20px;border-radius:10px;max-width:600px;margin:auto}
button{padding:10px 16px;background:#1e3d8f;color:white;border:none;border-radius:6px;margin-top:10px;cursor:pointer}
</style>
</head>

<body>

<div class="card">
<h2>Validation Report Generator</h2>

<input type="file" id="fileInput" accept=".xlsx" />
<br>
<button onclick="processFile()">Generate Report</button>

</div>

<script>

<!-- ✅ FIX 2: Global error handler -->
window.onerror = function(msg, url, line){
alert("JS Error: " + msg + " at line " + line)
}

function processFile(){

let fileInput = document.getElementById("fileInput")

if(!fileInput.files.length){
alert("Upload file first")
return
}

let file = fileInput.files[0]
let reader = new FileReader()

reader.onload = function(e){

try{

let data = new Uint8Array(e.target.result)
let wb = XLSX.read(data, {type:'array'})

console.log("Sheets:", wb.SheetNames)

/* ✅ FIX 3: SAFE SHEET HANDLING */

let rawSheet = wb.Sheets["Validation Data"] || wb.Sheets[wb.SheetNames[0]]
let measSheet = wb.Sheets["Measurements"] || wb.Sheets[wb.SheetNames[1]]

if(!rawSheet){
alert("Validation Data sheet not found")
return
}

let raw = XLSX.utils.sheet_to_json(rawSheet)
let meas = measSheet ? XLSX.utils.sheet_to_json(measSheet) : []

/* ---------------- COMMON ---------------- */

let rooms = [...new Set(raw.map(r=>r.Room))]

/* ---------------- PROJECT (COLUMN FORMAT) ---------------- */

let ignoreCols = ["Room","Section","Item","Value","Walls","Comments"]

let project = {}

raw.forEach(r=>{
Object.keys(r).forEach(k=>{
if(!ignoreCols.includes(k) && !project[k]){
project[k] = r[k]
}
})
})

let projectSheet = []

Object.keys(project).forEach(k=>{
projectSheet.push({Parameter:k, Value:project[k]})
})

/* ---------------- VALIDATION MATRIX ---------------- */

let combinedMatrix = []

let headerRow = {Question:"Question"}
rooms.forEach(r=>headerRow[r]=r)
combinedMatrix.push(headerRow)

/* WALL */
combinedMatrix.push({Question:""})
combinedMatrix.push({Question:"WALL VALIDATION"})

let wallRows = raw.filter(r=>r.Section==="Wall")
let wallQuestions = [...new Set(wallRows.map(r=>r.Item))]

wallQuestions.forEach(q=>{
let row = {Question:q}

rooms.forEach(room=>{
let rec = wallRows.find(r=>r.Room===room && r.Item===q)

if(rec){
let parts = [rec.Walls,rec.Value,rec.Comments].filter(x=>x)
row[room] = parts.join(" | ")
}else{
row[room] = ""
}
})

combinedMatrix.push(row)
})

/* ROOM */
combinedMatrix.push({Question:""})
combinedMatrix.push({Question:"ROOM VALIDATION"})

let roomRows = raw.filter(r=>r.Section==="Room")
let roomQuestions = [...new Set(roomRows.map(r=>r.Item))]

roomQuestions.forEach(q=>{
let row = {Question:q}

rooms.forEach(room=>{
let rec = roomRows.find(r=>r.Room===room && r.Item===q)

if(rec){
let parts = [rec.Value,rec.Comments].filter(x=>x)
row[room] = parts.join(" | ")
}else{
row[room] = ""
}
})

combinedMatrix.push(row)
})

/* ---------------- INSIGHTS ---------------- */

let insights = rooms.map(r=>({Room:r, Insights:""}))

/* ---------------- MEASUREMENTS ---------------- */

let measurementSheet = meas

/* ✅ FIX 4: SAFE EMPTY MEASUREMENTS */
if(measurementSheet.length === 0){
measurementSheet = [{}]
}

/* ---------------- EXPORT ---------------- */

let newWB = XLSX.utils.book_new()

let ws1 = XLSX.utils.json_to_sheet(projectSheet)
let ws2 = XLSX.utils.json_to_sheet(combinedMatrix)
let ws3 = XLSX.utils.json_to_sheet(insights)
let ws4 = XLSX.utils.json_to_sheet(measurementSheet)

/* FORMATTING */

function setColWidth(ws, count, width=30){
ws['!cols'] = Array(count).fill({wch:width})
}

function wrapText(ws){
Object.keys(ws).forEach(cell=>{
if(cell[0]==="!") return
if(!ws[cell].s) ws[cell].s={}
ws[cell].s.alignment = {wrapText:true, vertical:"top"}
})
}

setColWidth(ws1,2,35)
setColWidth(ws2,rooms.length+1,35)
setColWidth(ws3,2,40)
setColWidth(ws4,Object.keys(measurementSheet[0]||{}).length,25)

wrapText(ws2)
wrapText(ws3)

/* ADD SHEETS */

XLSX.utils.book_append_sheet(newWB, ws1, "Project & Society")
XLSX.utils.book_append_sheet(newWB, ws2, "Validation Matrix")
XLSX.utils.book_append_sheet(newWB, ws3, "Insights")
XLSX.utils.book_append_sheet(newWB, ws4, "Measurements")

/* DOWNLOAD */

XLSX.writeFile(newWB, "Validation_Report.xlsx")

alert("✅ Report Generated Successfully")

}catch(err){
console.error(err)
alert("Error processing file. Check console (F12)")
}

}

reader.readAsArrayBuffer(file)

}

/* ✅ FIX 5: LOAD CHECK */
document.addEventListener("DOMContentLoaded", ()=>{
console.log("App Loaded ✅")
})

</script>

</body>
</html>
