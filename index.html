<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Site Validation Tool</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6fb;
}

header{
background:#1e3d8f;
color:white;
padding:14px;
font-size:18px;
position:sticky;
top:0;
z-index:10;
}

.container{
padding:14px;
max-width:1200px;
margin:auto;
}

.card{
background:white;
padding:16px;
margin-bottom:14px;
border-radius:8px;
border:1px solid #ddd;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr 1fr;
gap:10px;
}

@media(max-width:900px){
.grid{
grid-template-columns:1fr;
}
}

input,select,textarea{
width:100%;
padding:10px;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

textarea{
height:70px;
}

button{
padding:12px 16px;
border:none;
background:#1e3d8f;
color:white;
border-radius:6px;
margin:4px;
font-size:14px;
cursor:pointer;
}

.roomNav{
position:sticky;
top:60px;
background:white;
padding:8px;
border-bottom:1px solid #ddd;
z-index:9;
}

.roomTab{
display:inline-block;
padding:10px 14px;
border:1px solid #ccc;
margin:4px;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

table th,table td{
border:1px solid #ddd;
padding:6px;
text-align:center;
font-size:13px;
}

.question{
border-bottom:1px dashed #ddd;
padding-bottom:10px;
margin-bottom:10px;
}

.sectionHeader{
background:#eef2ff;
padding:8px;
border-radius:6px;
margin-top:12px;
font-weight:bold;
}

</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

</head>

<body>

<header>Site Validation Tool</header>

<div class="container">

<div class="card">

<h3>Project Details</h3>

<div class="grid">

<div><label>PID</label><input id="pid"></div>
<div><label>Customer</label><input id="cx"></div>
<div><label>City</label><input id="city"></div>
<div><label>Address</label><input id="address"></div>
<div><label>Society</label><input id="society"></div>
<div><label>Flat</label><input id="flat"></div>

</div>

</div>


<div class="card">

<h3>Society Execution Constraints</h3>

<div class="grid">

<div>
<label>Service Lift</label>
<select id="serviceLift">
<option></option>
<option>Yes</option>
<option>No</option>
</select>
</div>

<div>
<label>Lift Size</label>
<input id="liftSize">
</div>

<div>
<label>Passenger Lift</label>
<select id="passLift">
<option></option>
<option>Allowed</option>
<option>Not Allowed</option>
<option>No Lift</option>
</select>
</div>

<div>
<label>Vehicle Entry</label>
<select id="vehicle">
<option></option>
<option>Small Vehicles</option>
<option>Large Vehicles</option>
<option>Not Allowed</option>
</select>
</div>

<div>
<label>Power Supply</label>
<select id="power">
<option></option>
<option>Yes</option>
<option>No</option>
</select>
</div>

<div>
<label>Water Supply</label>
<select id="water">
<option></option>
<option>Yes</option>
<option>No</option>
</select>
</div>

<div>
<label>Mivan</label>
<select id="mivan">
<option></option>
<option>Yes</option>
<option>No</option>
</select>
</div>

<div>
<label>Demolition</label>
<select id="demo">
<option></option>
<option>Manual</option>
<option>Mechanised</option>
<option>Both</option>
</select>
</div>

<div>
<label>Work Time</label>
<input id="workTime">
</div>

<div>
<label>Restrictions</label>
<textarea id="societyRestrictions"></textarea>
</div>

</div>

</div>

<div class="roomNav">
<div id="roomTabs"></div>
<button onclick="addRoom()">Add Room</button>
</div>

<div class="card" id="roomForm"></div>

<div class="card">

<button onclick="generateReport()">Generate PDF + Excel</button>

</div>

</div>


<script>

const walls=["NW","EW","SW","WW"]

const defaultRooms=[
"Living Room",
"Kitchen",
"Bedroom 1",
"Bedroom 2",
"Bathroom 1",
"Bathroom 2",
"Balcony"
]

const roomQuestions=[
"False ceiling clearance sufficient",
"Ceiling undulation present",
"Water leakage on ceiling",
"Sliding system feasible",
"Window modification possible",
"Window condition poor",
"Module relocation possible",
"15A power supply present",
"Plumbing issues present",
"Plumbing outdated",
"Main inlet valve accessible",
"Space for shower cubicle",
"WC relocation possible",
"Damp proof required",
"Weather proof required",
"Existing countertop present",
"False ceiling damage",
"Door condition poor",
"Door refurbishable",
"Termite infestation present"
]

const wallQuestions=[
"Load bearing wall / Mivan wall",
"Dry wall / Gypsum wall",
"Major cracks requiring structural repair",
"Surface undulation",
"Undulation more than 6mm",
"Minor cracks / loose plaster",
"Core cut location available",
"Switch/socket working condition",
"Switchboard reusable",
"Split AC possible",
"Dark shade on wall",
"Paint condition poor"
]

let data={rooms:{}}

function init(){
defaultRooms.forEach(r=>{
data.rooms[r]={measurements:{},electrical:{},room:{},walls:{}}
})
renderTabs()
}

function renderTabs(){
let html=""
Object.keys(data.rooms).forEach(r=>{
html+=`<span class="roomTab" onclick="openRoom('${r}')">${r}</span>`
})
document.getElementById("roomTabs").innerHTML=html
}

function addRoom(){
let name=prompt("Room name")
if(!name) return
data.rooms[name]={measurements:{},electrical:{},room:{},walls:{}}
renderTabs()
}

function openRoom(room){

let r=data.rooms[room]

let html=`<h3>${room}</h3>`

html+=`<div class="sectionHeader">Ceiling Height</div>

<div class="grid">
<input placeholder="NW" value="${r.measurements.nw||''}" oninput="saveMeasure('${room}','nw',this.value)">
<input placeholder="NE" value="${r.measurements.ne||''}" oninput="saveMeasure('${room}','ne',this.value)">
<input placeholder="SE" value="${r.measurements.se||''}" oninput="saveMeasure('${room}','se',this.value)">
<input placeholder="SW" value="${r.measurements.sw||''}" oninput="saveMeasure('${room}','sw',this.value)">
<input placeholder="Center" value="${r.measurements.center||''}" oninput="saveMeasure('${room}','center',this.value)">
</div>`

html+=`<div class="sectionHeader">Room Diagonal</div>

<div class="grid">
<input placeholder="Diagonal 1" value="${r.measurements.d1||''}" oninput="saveMeasure('${room}','d1',this.value)">
<input placeholder="Diagonal 2" value="${r.measurements.d2||''}" oninput="saveMeasure('${room}','d2',this.value)">
</div>`

html+=`<div class="sectionHeader">Wall Deviation</div>

<div class="grid">
<input placeholder="NW" value="${r.measurements.devNW||''}" oninput="saveMeasure('${room}','devNW',this.value)">
<input placeholder="EW" value="${r.measurements.devEW||''}" oninput="saveMeasure('${room}','devEW',this.value)">
<input placeholder="SW" value="${r.measurements.devSW||''}" oninput="saveMeasure('${room}','devSW',this.value)">
<input placeholder="WW" value="${r.measurements.devWW||''}" oninput="saveMeasure('${room}','devWW',this.value)">
</div>`

/* Electrical */

html+=`<div class="sectionHeader">Electrical</div>

<table>
<tr>
<th>Wall</th>
<th>4M</th>
<th>6M</th>
<th>8M</th>
<th>12M</th>
<th>Fan</th>
<th>AC</th>
</tr>`

walls.forEach(w=>{

let e=r.electrical[w]||{}

html+=`<tr>

<td>${w}</td>

<td><input type="number" value="${e['4M']||''}" oninput="saveElec('${room}','${w}','4M',this.value)"></td>

<td><input type="number" value="${e['6M']||''}" oninput="saveElec('${room}','${w}','6M',this.value)"></td>

<td><input type="number" value="${e['8M']||''}" oninput="saveElec('${room}','${w}','8M',this.value)"></td>

<td><input type="number" value="${e['12M']||''}" oninput="saveElec('${room}','${w}','12M',this.value)"></td>

<td><input type="number" value="${e['fan']||''}" oninput="saveElec('${room}','${w}','fan',this.value)"></td>

<td><input type="number" value="${e['ac']||''}" oninput="saveElec('${room}','${w}','ac',this.value)"></td>

</tr>`
})

html+="</table>"

/* Room questions */

html+=`<div class="sectionHeader">Room Observations</div>`

roomQuestions.forEach(q=>{
let v=r.room[q]||{}
html+=`<div class="question">

<label>${q}</label>

<select oninput="saveRoom('${room}','${q}',this.value)">
<option></option>
<option ${v.answer=='Yes'?'selected':''}>Yes</option>
<option ${v.answer=='No'?'selected':''}>No</option>
<option ${v.answer=='N.A'?'selected':''}>N.A</option>
</select>

<textarea oninput="saveRoomComment('${room}','${q}',this.value)">${v.comment||''}</textarea>

</div>`
})

/* Wall questions */

html+=`<div class="sectionHeader">Wall Observations</div>`

wallQuestions.forEach(q=>{
let v=r.walls[q]||{}
html+=`<div class="question">

<label>${q}</label>

<select oninput="saveWall('${room}','${q}','answer',this.value)">
<option></option>
<option ${v.answer=='Yes'?'selected':''}>Yes</option>
<option ${v.answer=='No'?'selected':''}>No</option>
<option ${v.answer=='N.A'?'selected':''}>N.A</option>
</select>

<select multiple oninput="saveWallWalls('${room}','${q}',this)">
<option ${v.walls?.includes('NW')?'selected':''}>NW</option>
<option ${v.walls?.includes('EW')?'selected':''}>EW</option>
<option ${v.walls?.includes('SW')?'selected':''}>SW</option>
<option ${v.walls?.includes('WW')?'selected':''}>WW</option>
</select>

<textarea oninput="saveWall('${room}','${q}','comment',this.value)">${v.comment||''}</textarea>

</div>`
})

document.getElementById("roomForm").innerHTML=html
}

function saveMeasure(r,k,v){data.rooms[r].measurements[k]=v}
function saveElec(r,w,t,v){
if(!data.rooms[r].electrical[w])data.rooms[r].electrical[w]={}
data.rooms[r].electrical[w][t]=v
}
function saveRoom(r,q,v){
if(!data.rooms[r].room[q])data.rooms[r].room[q]={}
data.rooms[r].room[q].answer=v
}
function saveRoomComment(r,q,v){
if(!data.rooms[r].room[q])data.rooms[r].room[q]={}
data.rooms[r].room[q].comment=v
}
function saveWall(r,q,t,v){
if(!data.rooms[r].walls[q])data.rooms[r].walls[q]={}
data.rooms[r].walls[q][t]=v
}
function saveWallWalls(r,q,e){
let s=[...e.selectedOptions].map(o=>o.value)
if(!data.rooms[r].walls[q])data.rooms[r].walls[q]={}
data.rooms[r].walls[q].walls=s
}

/* REPORT */

function generateReport(){

let project=[{
PID:document.getElementById("pid").value,
Customer:document.getElementById("cx").value,
City:document.getElementById("city").value,
Address:document.getElementById("address").value,
Society:document.getElementById("society").value,
Flat:document.getElementById("flat").value
}]

let measurements=[]
let electrical=[]
let roomObs=[]
let wallObs=[]

Object.keys(data.rooms).forEach(room=>{

let r=data.rooms[room]

Object.entries(r.measurements).forEach(([k,v])=>{
measurements.push({Room:room,Item:k,Value:v})
})

Object.entries(r.electrical).forEach(([wall,val])=>{
Object.entries(val).forEach(([k,v])=>{
electrical.push({Room:room,Wall:wall,Module:k,Value:v})
})
})

Object.entries(r.room).forEach(([q,v])=>{
roomObs.push({Room:room,Question:q,Answer:v.answer,Comment:v.comment})
})

Object.entries(r.walls).forEach(([q,v])=>{
wallObs.push({Room:room,Question:q,Answer:v.answer,Walls:(v.walls||[]).join(","),Comment:v.comment})
})

})

let wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(project),"Project")
XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(measurements),"Measurements")
XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(electrical),"Electrical")
XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(roomObs),"Room Observations")
XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(wallObs),"Wall Observations")

XLSX.writeFile(wb,"site_validation.xlsx")

}

init()

</script>

</body>
</html>
