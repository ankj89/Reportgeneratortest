var insightsData = [];

var matrixDataRaw = [];
var projectDataRaw = {};
var societyData = [];
let currentReportId = null;
function norm(str){return (str||"").toLowerCase().replace(/[^a-z0-9]/g,"");}
function getAllReports(){
return JSON.parse(localStorage.getItem("validationReports") || "{}");
}
function getReportName(){

let pid = "";
let cx = "";

/* try to read from project data */
if(matrixDataRaw.length){
pid = matrixDataRaw[0].PID || matrixDataRaw[0].Pid || "";
cx = matrixDataRaw[0]["Cx Name"] || matrixDataRaw[0].Cx || "";
}

/* fallback if not found */
pid = pid || "PID";
cx = cx || "Cx";

/* timestamp */
let now = new Date();
let ts = now.toLocaleString();

/* final */
return `${pid}_${cx} (${ts})`;

}
 
function saveCurrentReport(){

if(!currentReportId) return;

let allReports = getAllReports();

allReports[currentReportId] = {
matrixDataRaw,
measData,
societyData,
reportHTML: document.getElementById("reportPreview").innerHTML,
insightsData,
timestamp: new Date().toISOString()
};

localStorage.setItem("validationReports", JSON.stringify(allReports));

populateReportList();
}
 
function getUniqueWalls(matches){

let wallSet = new Set();

matches.forEach(x=>{

if(!x.Walls) return;

/* split multiple */
x.Walls.split(",").forEach(w=>{

let clean = w.trim().toUpperCase();

if(["NW","EW","SW","WW"].includes(clean)){
wallSet.add(clean);
}

});

});

/* order */
const order = ["NW","EW","SW","WW"];

return Array.from(wallSet)
.sort((a,b)=>order.indexOf(a)-order.indexOf(b))
.join(", ");

}




 
function createNewReport(){

currentReportId = getReportName();

matrixDataRaw = [];
measData = [];
societyData = [];
insightsData = [];

document.getElementById("reportPreview").innerHTML = "";

saveCurrentReport();

}

function loadReport(reportId){

let allReports = getAllReports();
let data = allReports[reportId];
if(!data) return;

currentReportId = reportId;

matrixDataRaw = data.matrixDataRaw || [];
measData = data.measData || [];
societyData = data.societyData || [];
insightsData = data.insightsData || [];

document.getElementById("reportPreview").innerHTML = data.reportHTML || "";

document.getElementById("saveBtn").classList.remove("hidden");
document.getElementById("postFinalize").classList.remove("hidden");

alert("Report loaded");
}

function loadSelectedReport(){
let id = document.getElementById("reportList").value;
if(!id){ alert("Select report"); return; }
loadReport(id);
}

function deleteReport(){

let id = document.getElementById("reportList").value;
if(!id) return;

if(!confirm("Delete this report?")) return;

let reports = getAllReports();
delete reports[id];

localStorage.setItem("validationReports", JSON.stringify(reports));

populateReportList();

alert("Report deleted");
}

function populateReportList(){

let reports = getAllReports();
let dropdown = document.getElementById("reportList");

if(!dropdown) return;

dropdown.innerHTML = "";

Object.keys(reports).forEach(id=>{
let opt = document.createElement("option");
opt.value = id;
opt.text = id;
dropdown.appendChild(opt);
});

}
 
function classifyInsight(text){

let t = (text || "").toLowerCase();

/* TYPE */
let type = "";

if(t.includes("design") || t.includes("suggested") || t.includes("recommended")){
type = "Design Input";
}
else if(t.includes("charges") || t.includes("cost") || t.includes("additional")){
type = "Cost Input";
}
else{
type = "Execution Input";
}

/* CATEGORY */
let category = "";

if(t.includes("plaster") || t.includes("civil") || t.includes("wall") || t.includes("floor")){
category = "Civil";
}
else if(t.includes("electrical") || t.includes("wiring") || t.includes("switch")){
category = "Electrical";
}
else if(t.includes("plumbing") || t.includes("water") || t.includes("drain")){
category = "Plumbing";
}
else if(t.includes("carpentry") || t.includes("wood") || t.includes("wardrobe")){
category = "Carpentry";
}
else if(t.includes("paint") || t.includes("polish")){
category = "Paint";
}
else if(t.includes("false ceiling") || t.includes("ceiling")){
category = "False Ceiling";
}
else{
category = "";
}

return {type, category};

}

output:(matches)=>{

let room = matches[0].Room;

/* ---------------- FETCH ROOM DATA ---------------- */
let wallsData = matrixDataRaw.filter(x => x.Room === room);
let meas = measData.find(m => m.Room === room) || {};

/* ---------------- CONDITIONS ---------------- */

/* 1. UNDULATION CHECK */
let undVals = [meas.undNW, meas.undEW, meas.undSW, meas.undWW]
.map(Number).filter(x=>x>0);

let undulationOK = undVals.length ? undVals.every(v => v <= 3) : true;

/* 2. PUNNING / PLASTER CHECK */
let hasPunning = wallsData.some(x =>
norm(x.Item).includes("undulation") &&
(Number(x.Value) > 5)
);

/* 3. DARK SHADE */
let hasDark = wallsData.some(x =>
norm(x.Item).includes("dark") &&
norm(x.Value).includes("yes")
);

/* 4. WATERPROOFING */
let hasSeepage = wallsData.some(x =>
norm(x.Item).includes("seepage") &&
norm(x.Value).includes("yes")
);

/* 5. SKIRTING */
let skirting = wallsData.some(x =>
norm(x.Item).includes("skirting") &&
norm(x.Value).includes("no")
);

/* ---------------- FINAL DECISION ---------------- */

if(
undulationOK &&
!hasPunning &&
!hasDark &&
!hasSeepage &&
!skirting
){
return "Re-painting can be considered. In case of any electrical works, fresh painting recommended";
}

return null;

}

output:(v,m)=>{

let fcMin = Math.min(...fcVals);

/* ---------------- MESSAGES ---------------- */

let msgs = [];

/* FLOOR TO CEILING */

msgs.push(`Utilities cannot be concelaed in flat false ceiling as clear height will become <8ft. Periperal False Ceiling suggested`);
}
/* SPRINKLER / UTILITIES */
/* ---------------- EFFECTIVE HEIGHT ---------------- */

/* take minimum of all valid */
let validHeights = [fcMin, beam, sprinkler].filter(x=>x>0);
 let permHeights = [beam, sprinkler].filter(x=>x>0);
let effective = Math.max(...validHeights);
let permicible = Math.max(...permHeights);
/* ---------------- FALSE CEILING CALC ---------------- */

/* target clear height = 8 ft = 2440 mm */
let target = 2490;

/* max drop allowed */
let maxDrop = effective - target;
 
let minDrop = effective - pemicible;

if(maxDrop < 75){
msg.push( `Available depth only ${maxDrop} mm. False ceiling not recommended`);
}
/* minimum drop (practical service gap) */
if(permicible>2490){
 msg.push( `Recommended false ceiling drop: ${minDrop} mm to ${maxDrop} mm`);
}  // can adjust to 75–100
if(permicible<2490){
msg.push( `Recommended false ceiling drop: 75 mm to ${maxDrop} mm`);
}



/* ---------------- AC POCKET LOGIC ---------------- */

let acWalls = [];

[
["NW", m.doorsoffitNW, m.winSoffitNW],
["EW", m.doorsoffitEW, m.winSoffitEW],
["SW", m.doorsoffitSW, m.winSoffitSW],
["WW", m.doorsoffitWW, m.winSoffitWW]
].forEach(([w,d1,d2])=>{

let v1 = Number(d1)||0;
let v2 = Number(d2)||0;

/* available drop space */
let available = Math.min(
v1>0?v1:9999,
v2>0?v2:9999
);

/* if available < required drop */
if(available < (minDrop + 100)){ // 100 buffer for AC piping
acWalls.push(w);
}

});

if(acWalls.length){
msgs.push(`AC pocket required on walls ${acWalls.join(", ")} due to insufficient soffit depth`);
}

/* ---------------- FINAL ---------------- */

return msgs.join(" | ");

}
},

{
id:"DOOR_SIZE",
type:"measurement",
condition:{fields:["doorheight","doorwidth"]},
output:(v)=>{
let h=Number(v[0]), w=Number(v[1]);
if(!h||!w) return null;

if(h<2440 || w<900){
return `Available Door size (${h}x${w} mm). Design furniture accordingly`;
}
if(h>2440){
return "Door height more than 8ft observed";
}
return null;
}
},

{
id:"SOFFIT_AC",
type:"measurement",
condition:{fields:["doorsoffitNW","doorsoffitEW","doorsoffitSW","doorsoffitWW","winSoffitNW","winSoffitEW","winSoffitSW","winSoffitWW"]},
output:(v,m)=>{
let walls=[];

[
["NW",m.doorsoffitNW,m.winSoffitNW],
["EW",m.doorsoffitEW,m.winSoffitEW],
["SW",m.doorsoffitSW,m.winSoffitSW],
["WW",m.doorsoffitWW,m.winSoffitWW]
].forEach(([w,a,b])=>{
if((a>0&&a<800)||(b>0&&b<800)) walls.push(w);
});

if(!walls.length) return null;

return `AC space constraint on walls ${walls.join(", ")}. False ceiling pocket required`;
}
},

{
id:"WALL_UNDULATION",
type:"measurement",
condition:{fields:["undNW","undEW","undSW","undWW"]},
output:(v,m)=>{
let msgs=[];

[
["NW",m.undNW],
["EW",m.undEW],
["SW",m.undSW],
["WW",m.undWW]
].forEach(([w,val])=>{
let x=Number(val)||0;

if(x>5 && x<=20){
msgs.push(`${w}: Undulation 5–20mm. Punning required`);
}
else if(x>20){
msgs.push(`${w}: Undulation >20mm. Plastering required`);
}
});

return msgs.length ? msgs.join(" | ") : null;
}
}

];

function runRuleEngine(rooms){
let insights=[];

RULES.forEach(rule=>{

if(rule.type==="wall"||rule.type==="room"){
rooms.forEach(room=>{
let matches = matrixDataRaw.filter(x=>
x.Room===room &&
norm(x.Item).includes(norm(rule.condition.itemIncludes)) &&
(
!rule.condition.valueEquals ||
norm(x.Value||"").includes(norm(rule.condition.valueEquals))
)
);

/* 🔥 REMOVE DUPLICATE WALL ENTRIES */
let uniqueMap = new Map();

matches.forEach(x=>{
let key = (x.Walls || "").replace(/\s/g,""); // normalize
if(!uniqueMap.has(key)){
uniqueMap.set(key, x);
}
});

matches = Array.from(uniqueMap.values());
if(matches.length){
let res=rule.output(matches);
if(res) insights.push({room,text:res});
}
});
}

if(rule.type==="measurement"){
measData.forEach(m=>{
if(!m.Room) return;
let vals=rule.condition.fields.map(f=>m[f]||null);
let res=rule.output(vals,m);
if(res) insights.push({room:m.Room,text:res});
});
}

if(rule.type==="society"){
societyData.forEach(s=>{
if(!s.Value || s.Value.trim() === "") return;
/* QUESTION MATCH (MANDATORY) */
if(!norm(s.Question).includes(norm(rule.condition.questionIncludes))) return;

/* VALUE MATCH (ONLY IF PRESENT) */
if(rule.condition.valueEquals){

let actual = (s.Value || "").trim();
let expected = rule.condition.valueEquals.trim();

/* EXACT MATCH ONLY */
if(actual !== expected){
    return;
}
}
/* RUN RULE */
let res = rule.output(s);
if(res) insights.push({room:"All",text:res});

});
}

});

return insights;
}

function parseCustomDate(str){

if(!str) return null;

/* FORMAT: 14/04/2026, 02:51:26 */
let parts = str.split(",");
if(parts.length < 2) return null;

let datePart = parts[0].trim();   // 14/04/2026
let timePart = parts[1].trim();   // 02:51:26

let [day, month, year] = datePart.split("/");

return new Date(`${year}-${month}-${day}T${timePart}`);
}
