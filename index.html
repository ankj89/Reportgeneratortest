<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Validation Report Generator1</title>

<!-- ✅ FIX 1: Stable CDN -->
<script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>

<style>
body{font-family:Arial;background:#f4f6fb;padding:20px}
.card{background:#fff;padding:20px;border-radius:10px;max-width:600px;margin:auto}
button{padding:10px 16px;background:#1e3d8f;color:white;border:none;border-radius:6px;margin-top:10px;cursor:pointer}
</style>
</head>

<body>

<div class="card">
<h2>Validation Report Generator</h2>

<input type="file" id="fileInput" accept=".xlsx" />
<br>
<button onclick="processFile()">Generate Report</button>

</div>

<script>

window.onerror = function(msg, url, line){
alert("JS Error: " + msg + " at line " + line)
}

function processFile(){

let fileInput = document.getElementById("fileInput")

if(!fileInput.files.length){
alert("Upload file first")
return
}

let file = fileInput.files[0]
let reader = new FileReader()

reader.onload = function(e){

try{

let data = new Uint8Array(e.target.result)
let wb = XLSX.read(data, {type:'array'})

let rawSheet = wb.Sheets["Validation Data"] || wb.Sheets[wb.SheetNames[0]]
let measSheet = wb.Sheets["Measurements"] || wb.Sheets[wb.SheetNames[1]]

let raw = XLSX.utils.sheet_to_json(rawSheet)
let meas = measSheet ? XLSX.utils.sheet_to_json(measSheet) : []

let rooms = [...new Set(raw.map(r=>r.Room))]

/* ---------------- PROJECT (DISPLAY LABELS) ---------------- */

const displayMap = {
pid:"Project ID",
cx:"Client Name",
city:"City",
address:"Address",
society:"Society Name",
flat:"Flat No",
floorNo:"Floor No",
propertyType:"Property Type",
serviceLiftUsage:"Service Lift Usage",
loadingArea:"Loading Area",
societyDemolish:"Demolition Rules",
vehicleEntry:"Vehicle Entry",
waterPoint:"Water Supply",
electricPoint:"Electric Supply",
workNOC:"NOC Requirement",
societyRestrictions:"Restrictions",
societyWorktimings:"Work Timings"
}

let ignoreCols = ["Room","Section","Item","Value","Walls","Comments"]

let project = {}

raw.forEach(r=>{
Object.keys(r).forEach(k=>{
if(!ignoreCols.includes(k) && !project[k]){
project[k] = r[k]
}
})
})

let projectSheet = []

Object.keys(project).forEach(k=>{
projectSheet.push({
Parameter: displayMap[k] || k,
Value: project[k]
})
})

/* ---------------- VALIDATION MATRIX ---------------- */

let combinedMatrix = []

let header = {Question:"Question"}
rooms.forEach(r=>header[r]=r)
combinedMatrix.push(header)

combinedMatrix.push({Question:""})
combinedMatrix.push({Question:"WALL VALIDATION"})

let wallRows = raw.filter(r=>r.Section==="Wall")
let wallQuestions = [...new Set(wallRows.map(r=>r.Item))]

wallQuestions.forEach(q=>{
let row = {Question:q}
rooms.forEach(room=>{
let rec = wallRows.find(r=>r.Room===room && r.Item===q)
row[room] = rec ? [rec.Walls,rec.Value,rec.Comments].filter(x=>x).join(" | ") : ""
})
combinedMatrix.push(row)
})

combinedMatrix.push({Question:""})
combinedMatrix.push({Question:"ROOM VALIDATION"})

let roomRows = raw.filter(r=>r.Section==="Room")
let roomQuestions = [...new Set(roomRows.map(r=>r.Item))]

roomQuestions.forEach(q=>{
let row = {Question:q}
rooms.forEach(room=>{
let rec = roomRows.find(r=>r.Room===room && r.Item===q)
row[room] = rec ? [rec.Value,rec.Comments].filter(x=>x).join(" | ") : ""
})
combinedMatrix.push(row)
})

/* ---------------- INSIGHTS (NEW FORMAT) ---------------- */

let insights = []

for(let i=1;i<=25;i++){
let row = {SNo:i}
rooms.forEach(r=>row[r]="")
insights.push(row)
}

/* ---------------- MEASUREMENTS (TRANSPOSED) ---------------- */

let measurementSheet = []

if(meas.length>0){

let keys = Object.keys(meas[0]).filter(k=>k!=="Room")

keys.forEach(k=>{
let row = {Measurement:k}
meas.forEach(r=>{
row[r.Room] = r[k] || ""
})
measurementSheet.push(row)
})

}else{
measurementSheet=[{}]
}

/* ---------------- EXPORT ---------------- */

let wbNew = XLSX.utils.book_new()

let ws1 = XLSX.utils.json_to_sheet(projectSheet)
let ws2 = XLSX.utils.json_to_sheet(combinedMatrix)
let ws3 = XLSX.utils.json_to_sheet(insights)
let ws4 = XLSX.utils.json_to_sheet(measurementSheet)

/* 🔥 FORMATTING */

function setWidth(ws, count, width){
ws['!cols'] = Array(count).fill({wch:width})
}

function wrap(ws){
Object.keys(ws).forEach(c=>{
if(c[0]==="!") return
ws[c].s = {alignment:{wrapText:true,vertical:"top"}}
})
}

/* Apply */
setWidth(ws1,2,40)
setWidth(ws2,rooms.length+1,35)
setWidth(ws3,rooms.length+1,40)
setWidth(ws4,rooms.length+1,25)

wrap(ws2)
wrap(ws3)

/* Sheets */
XLSX.utils.book_append_sheet(wbNew, ws1, "Project & Society")
XLSX.utils.book_append_sheet(wbNew, ws2, "Validation Matrix")
XLSX.utils.book_append_sheet(wbNew, ws3, "Insights")
XLSX.utils.book_append_sheet(wbNew, ws4, "Measurements")

XLSX.writeFile(wbNew, "Validation_Report.xlsx")

alert("✅ Enterprise Report Generated")

}catch(err){
console.error(err)
alert("Error processing file. Check console")
}

}

reader.readAsArrayBuffer(file)

}

document.addEventListener("DOMContentLoaded", ()=>{
console.log("App Loaded ✅")
})

</script>

</body>
</html>
