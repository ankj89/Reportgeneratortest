function norm(str){
return (str || "")
.toLowerCase()
.replace(/\s/g,"")   // only remove spaces
}
function getAllReports(){
return JSON.parse(localStorage.getItem("validationReports") || "{}");
}
function getReportName(){

let pid = "";
let cx = "";

/* try to read from project data */
if(matrixDataRaw.length){
pid = matrixDataRaw[0].PID || matrixDataRaw[0].Pid || "";
cx = matrixDataRaw[0]["Cx Name"] || matrixDataRaw[0].Cx || "";
}

/* fallback if not found */
pid = pid || "PID";
cx = cx || "Cx";

/* timestamp */
let now = new Date();
let ts = now.toLocaleString();

/* final */
return `${pid}_${cx} (${ts})`;

}


 
 
function saveCurrentReport(){

if(!currentReportId) return;

let allReports = getAllReports();

allReports[currentReportId] = {
matrixDataRaw,
measData,
societyData,
reportHTML: document.getElementById("reportPreview").innerHTML,
insightsData,
timestamp: new Date().toISOString()
};

localStorage.setItem("validationReports", JSON.stringify(allReports));

populateReportList();
}
 





 
function createNewReport(){

currentReportId = getReportName();

matrixDataRaw = [];
measData = [];
societyData = [];
insightsData = [];

document.getElementById("reportPreview").innerHTML = "";

saveCurrentReport();

}

function loadReport(reportId){

let allReports = getAllReports();
let data = allReports[reportId];
if(!data) return;

currentReportId = reportId;

matrixDataRaw = data.matrixDataRaw || [];
measData = data.measData || [];
societyData = data.societyData || [];
insightsData = data.insightsData || [];

document.getElementById("reportPreview").innerHTML = data.reportHTML || "";

document.getElementById("saveBtn").classList.remove("hidden");
document.getElementById("postFinalize").classList.remove("hidden");

alert("Report loaded");
}
function getTreatment(mm){

if(mm <= ORTHO_LIMITS.minor){
    return null
}

if(mm > 5 && mm <= 20){
    return "POP punning required"
}

if(mm > 20 && mm <= 30){
    return "Plastering + punning required"
}

if(mm > 30){
    return "Wall panelling required"
}

return null
}

function detectWallIssuesAdvanced(wp, walls){

let c1 = Number(wp[0].val)
let mid = Number(wp[1].val)
let c2 = Number(wp[2].val)

let issues = []

/* ---------------- MID DEVIATION (BULGE / DIP) ---------------- */

let expectedMid = (c1 + c2) / 2
let midDev = Math.abs(mid - expectedMid)

let treatmentMid = getTreatment(midDev)

if(treatmentMid){
issues.push({
wall: walls.join(", "),
deviation: Math.round(midDev),
action: treatmentMid
})
}

/* ---------------- EDGE DEVIATION (TILT) ---------------- */

let edgeDiff = Math.abs(c1 - c2)

let treatmentEdge = getTreatment(edgeDiff)

if(treatmentEdge){

/* 🔥 IDENTIFY WHICH WALL */
let problemWall = c1 > c2 ? walls[0] : walls[1]

issues.push({
wall: problemWall,
deviation: Math.round(edgeDiff),
action: treatmentEdge
})
}

return issues
}
 
function loadSelectedReport(){
let id = document.getElementById("reportList").value;
if(!id){ alert("Select report"); return; }
loadReport(id);
}

function deleteReport(){

let id = document.getElementById("reportList").value;
if(!id) return;

if(!confirm("Delete this report?")) return;

let reports = getAllReports();
delete reports[id];

localStorage.setItem("validationReports", JSON.stringify(reports));

populateReportList();

alert("Report deleted");
}
function getWallsFromRoom(matches){

let walls = matches.map(x => x.Walls).filter(w => w && w.trim() !== "")

/* 🔥 split if multiple like "E1,E2" */
let expanded = walls.flatMap(w =>
w.split(",").map(e => e.trim())
)

/* 🔥 unique */
return [...new Set(expanded)].join(", ")


}
 
function populateReportList(){

let reports = getAllReports();
let dropdown = document.getElementById("reportList");

if(!dropdown) return;

dropdown.innerHTML = "";

Object.keys(reports).forEach(id=>{
let opt = document.createElement("option");
opt.value = id;
opt.text = id;
dropdown.appendChild(opt);
});

}
 
function classifyInsight(text){

let t = (text || "").toLowerCase();

/* TYPE */
let type = "";

if(t.includes("design") || t.includes("false") || t.includes("recommended")){
type = "Design Input";
}
else if(t.includes("charges") || t.includes("cost") || t.includes("additional")){
type = "Cost Input";
}
else{
type = "Execution Input";
}

/* CATEGORY */
let category = "";

if(t.includes("plaster") || t.includes("civil") || t.includes("wall") || t.includes("floor")){
category = "Civil";
}
else if(t.includes("electrical") || t.includes("wiring") || t.includes("switch")){
category = "Electrical";
}
else if(t.includes("plumbing") || t.includes("water") || t.includes("drain")){
category = "Plumbing";
}
else if(t.includes("carpentry") || t.includes("wood") || t.includes("wardrobe")){
category = "Carpentry";
}
else if(t.includes("paint") || t.includes("polish")){
category = "Paint";
}
else if(t.includes("false ceiling") || t.includes("ceiling")){
category = "False Ceiling";
}
else{
category = "";
}

return {type, category};

}

output:(matches)=>{

let wallsData = matrixDataRaw.filter(x => x.Room === room);

let undulationOK = true

if(elevs.length){

undulationOK = elevs.every(e=>{

let c = getWallValue(room, e, "Center")
let u = getWallValue(room, e, "Upper")

/* if no data → ignore wall */
if(!c && !u) return true

let dev = Math.abs((u || c) - c)

/* threshold same as earlier logic */
return dev <= 3

})

/* 2. PUNNING / PLASTER CHECK */

{
id:"WALL_ENGINE_FINAL",
type:"measurement",

output:(v,m)=>{

let elevs = getElevations(m.Room)

if(elevs.length < 2) return null

let issues = []

/* ---------------- WALL LEVEL CHECK ---------------- */

elevs.forEach(e=>{

let center = getWallValue(m.Room, e, "Center")
let upper  = getWallValue(m.Room, e, "Upper")

if(!center && !upper) return

let dev = Math.abs((upper || center) - center)

let action = getTreatment(dev)

if(action){
issues.push(`${e}: ${dev} mm → ${action}`)
}

})

/* ---------------- ORTHOGONAL CHECK ---------------- */

if(elevs.length >= 4){

let pair1 = [elevs[0], elevs[2]]
let pair2 = [elevs[1], elevs[3]]

let getAvg = (pair)=>{
let vals = pair.map(e => getWallValue(m.Room, e, "Center")).filter(x=>x)
if(!vals.length) return 0
return vals.reduce((a,b)=>a+b,0)/vals.length
}

let avg1 = getAvg(pair1)
let avg2 = getAvg(pair2)

let skew = Math.abs(avg1 - avg2)

if(skew > 5){
let action = getTreatment(skew)
if(action){
issues.push(`Room skew: ${skew} mm → ${action}`)
}
}

}

if(!issues.length) return null

return issues.join(" | ")

}
},

function runRuleEngine(rooms){
let insights=[];

RULES.forEach(rule=>{

if(rule.type==="wall"||rule.type==="room"){
rooms.forEach((rm, index)=>{
 if(typeof rm !== "string") return;
let matches = matrixDataRaw.filter(x=>
x.Room===rm &&
norm(x.Item).includes(norm(rule.condition.itemIncludes)) &&
(
!rule.condition.valueEquals ||
norm(x.Value||"").includes(norm(rule.condition.valueEquals))
)
);

/* 🔥 REMOVE DUPLICATE WALL ENTRIES */
let uniqueMap = new Map();

matches.forEach(x=>{
let key = (x.Walls || "")
.split(",")
.map(w=>w.trim())
.sort()
.join(","); // normalize
 
if(!uniqueMap.has(key)){
uniqueMap.set(key, x);
}
});

matches = Array.from(uniqueMap.values());
if(matches.length){
let res=rule.output(matches);
if(res) insights.push({room: rm.trim(), text: res});
}
});
}

if(rule.type==="measurement"){
measData.forEach(m=>{
if(!m.Room) return;
let vals = [];

if(rule.condition && rule.condition.fields){
    vals = rule.condition.fields.map(f=>m[f]||null);
}

 
let res = null;

try{
    res = rule.output(vals,m);
}catch(e){
    console.error("Rule failed:", rule.id, e);
}
 
if(res) insights.push({room:m.Room,text:res});
});
}

if(rule.type==="society"){
societyData.forEach(s=>{
if(!s.Value || s.Value.trim() === "") return;
/* QUESTION MATCH (MANDATORY) */
if(!norm(s.Question).includes(norm(rule.condition.questionIncludes))) return;

/* VALUE MATCH (ONLY IF PRESENT) */
if(rule.condition.valueEquals){

let actual = (s.Value || "").trim();
let expected = rule.condition.valueEquals.trim();

/* EXACT MATCH ONLY */
if(actual !== expected){
    return;
}
}
/* RUN RULE */
let res = rule.output(s);
if(res) insights.push({room:"All",text:res});

});
}

});

return insights;
}

function getRoomOrthoSummary(m){

let wp1 = [m.wp1_c1, m.wp1_mid, m.wp1_c2].map(Number).filter(x=>x)
let wp2 = [m.wp2_c1, m.wp2_mid, m.wp2_c2].map(Number).filter(x=>x)

if(wp1.length !== 3 || wp2.length !== 3) return ""

let dev1 = Math.max(...wp1) - Math.min(...wp1)
let dev2 = Math.max(...wp2) - Math.min(...wp2)

let avg1 = (wp1[0] + wp1[1] + wp1[2]) / 3
let avg2 = (wp2[0] + wp2[1] + wp2[2]) / 3

let skew = Math.abs(avg1 - avg2)

let maxDev = Math.max(dev1, dev2, skew)

if(maxDev > 30) return "Room not orthogonal (>30 mm)"
if(maxDev > 20) return "Room not orthogonal (20–30 mm)"
if(maxDev > 5) return "Room slightly skewed (5–20 mm)"

return ""
}

function createInsightTable(title, dataArr, tableId){

let html = `<div class="section">
<h2>${title}</h2>
<button onclick="deleteInsightBlock('${tableId}')">Delete Section</button>

<button onclick="addInsightRow('${tableId}')">+ Add Row</button>

<table id="${tableId}">
<thead>
<tr>
<th>SNo</th>
<th>Insights</th>
<th>Type of Insight</th>
<th>Category</th>
<th style="width:30%">Remarks</th>
</tr>
</thead>
<tbody>
`;
let rows = dataArr.length || 1

for(let i=0;i<rows;i++){

let txt = dataArr[i] || "";
let meta = txt ? classifyInsight(txt) : {type:"", category:""}


/* HTML */
html += `<tr>
<td>
${i+1}
<span onclick="deleteInsightRow(this)" style="color:red;cursor:pointer;margin-left:6px;">❌</span>
</td>
<td contenteditable="true">${txt}</td>
<td contenteditable="true">${meta.type}</td>
<td contenteditable="true">${meta.category}</td>
<td contenteditable="true" style="min-width:200px"></td>
</tr>`;

}

html += `</tbody></table></div>`;

return html;
}

}

document.addEventListener("focusin", function(e){
if(e.target.matches("[contenteditable].editable-placeholder")){
if(e.target.innerText.trim() === "Manual input required"){
e.target.innerText = "";
e.target.classList.remove("editable-placeholder");
e.target.classList.add("editable-active");
}
}
});

document.addEventListener("focusout", function(e){
if(e.target.matches("[contenteditable]")){
if(e.target.innerText.trim() === ""){
e.target.innerText = "Manual input required";
e.target.classList.add("editable-placeholder");
e.target.classList.remove("editable-active");
}
}
});
